// Pastilles Classement / Jardin, affichées quand le joueur a fini le quiz
// (ou s'est identifié) : il peut circuler entre les deux librement.
function pillsHtml(active) {
  return `<div class="pills">
    ${joueur ? `<button data-p="dashboard">🏠 Mon espace</button>` : ""}
    <button data-p="board" class="${active === "board" ? "on" : ""}">🏆 Classement</button>
    <button data-p="jardin" class="${active === "jardin" ? "on" : ""}">🌼 Mon jardin</button>
    <button data-p="reclamer" class="${active === "reclamer" ? "on" : ""}">🎁 Code</button>
  </div>`;
}
function bindPills() {
  app.querySelectorAll(".pills button").forEach((b) => b.addEventListener("click", async () => {
    if (b.dataset.p === "reclamer") { codeAReclamer = null; }
    if (b.dataset.p === "jardin") {
      jardin = await apiJardin();
      if (joueur) {
        const s = await apiSolde(joueur.name).catch(() => null);
        if (s && s.exists) joueur.solde = s.solde;
      }
    }
    userView = b.dataset.p;
    render();
  }));
}

function renderBoard() {
  clearInterval(tickTimer);
  const fini = phaseNow() === "termine";
  const titre = `<div class="board-titre">${fini ? "🏆 Résultats finaux <span>— merci d'avoir joué !</span>" : "🏆 Classement en direct"}</div>`;
  // On ne montre QUE ceux qui ont joué (un compte réservé mais pas encore joué
  // n'apparaît pas). Le serveur filtre déjà ; ici c'est utile en simulation.
  const lignes = board.filter((p) => p.quiz_fait !== false && !COMPTES_TEST.includes((p.name || "").toLowerCase()));
  if (!lignes.length) {
    app.innerHTML = `${pillsHtml("board")}<div class="card center">${titre}
      <p class="hint">${fini ? "Le quiz est terminé." : "Sois le premier ou la première à jouer ! 🌱"}</p></div>`;
    bindPills();
    return;
  }
  // Ma ligne à moi : si je suis identifié, je la mets en avant (score + rang) et
  // je propose d'aller directement dans mon jardin.
  const moiRang = joueur ? lignes.findIndex((p) => p.name.toLowerCase() === joueur.name.toLowerCase()) : -1;
  const moiHtml = (moiRang >= 0) ? `<div class="moi-score">
      <div class="moi-rang">${moiRang < 3 ? medals[moiRang] : "#" + (moiRang + 1)}</div>
      <div class="moi-info">
        <div class="moi-nom">${esc(lignes[moiRang].name)} — c'est toi ! 🌱</div>
        <div class="moi-pts">${affG(lignes[moiRang].score)} graines récoltées${moiRang < 3 ? " · sur le podium ! 🎉" : ""}</div>
      </div>
      <button class="btn" id="moi-jardin">🌼 Mon jardin</button>
    </div>` : "";
  const top3 = lignes.slice(0, 3);
  const rest = lignes.slice(3);
  const order = [1, 0, 2];
  app.innerHTML = `<div class="board-wrap">${pillsHtml("board")}<div class="card">
    ${titre}
    ${moiHtml}
    <div class="podium">
      ${order.map((pos) => top3[pos] ? `
        <div class="pod p${pos + 1}${moiRang === pos ? " moi" : ""}">
          <div class="pod-medal">${medals[pos]}</div>
          <div class="pod-name">${esc(top3[pos].name)}</div>
          <div class="pod-pts">${affG(top3[pos].score)} 🌰</div>
        </div>` : "").join("")}
    </div>
    ${rest.map((p, i) => `
      <div class="rank-row${moiRang === i + 3 ? " moi" : ""}">
        <span class="rank-pos">${i + 4}.</span>
        ${avatarDe(p.name)}
        <span class="rank-nom"><span class="qui">${esc(p.name)}</span></span>
        <span class="rank-pts">${affG(p.score)} 🌰</span>
      </div>`).join("")}
    <div class="center home-liens" style="margin-top:18px;">
      <button class="btn ghost" id="b-refresh">Actualiser 🔄</button>
      ${!joueur ? `<button class="btn ghost" id="b-compte">🌱 Retrouver mon jardin</button>` : ""}
      <button class="lien-explik" id="b-explik">✨ Comment ça marche ?</button>
    </div>
  </div></div>`;
  bindPills();
  const mj = $("#moi-jardin");
  if (mj) mj.addEventListener("click", async () => {
    jardin = await apiJardin();
    const s = await apiSolde(joueur.name).catch(() => null);
    if (s && s.exists) joueur.solde = s.solde;
    userView = "jardin"; render();
  });
  const bc = $("#b-compte");
  if (bc) bc.addEventListener("click", () => { jardinMsg = null; userView = "retrouver"; quiz = null; render(); });
  $("#b-explik").addEventListener("click", ouvreExplication);
  $("#b-refresh").addEventListener("click", async () => { board = await apiGetBoard(); renderBoard(); });
}

/* ============================================================
   🌼 VUE — LE JARDIN COLLECTIF
   Chacun dépense ses graines pour planter sur la grille commune.
   Les graines récoltées (le classement) ne bougent pas : seul le
   solde disponible diminue.
   ============================================================ */

// 💎 Les plantes RARES sont de vraies fleurs entièrement métalliques (or, argent,
// bronze) qui brillent. Les dégradés sont définis une fois, et chaque fleur les
// réutilise. La forme : 10 pétales autour d'un cœur, avec un reflet spéculaire.
const DEFS_METAL = `<svg width="0" height="0" style="position:absolute" aria-hidden="true"><defs>
  <radialGradient id="mfl-or" cx="38%" cy="30%" r="80%">
    <stop offset="0" stop-color="#FFFAD6"/><stop offset="30%" stop-color="#FFE06A"/>
    <stop offset="66%" stop-color="#E8A61A"/><stop offset="100%" stop-color="#8F620A"/></radialGradient>
  <radialGradient id="mfl-argent" cx="38%" cy="30%" r="80%">
    <stop offset="0" stop-color="#FFFFFF"/><stop offset="30%" stop-color="#EAEFF5"/>
    <stop offset="66%" stop-color="#AEB8C6"/><stop offset="100%" stop-color="#727C8B"/></radialGradient>
  <radialGradient id="mfl-bronze" cx="38%" cy="30%" r="80%">
    <stop offset="0" stop-color="#F9E2C4"/><stop offset="30%" stop-color="#E3A468"/>
    <stop offset="66%" stop-color="#B87333"/><stop offset="100%" stop-color="#6F4318"/></radialGradient>
</defs></svg>`;

function fleurRareSvg(tier) {
  const g = `url(#mfl-${tier})`;
  let petales = "";
  for (let i = 0; i < 10; i++) {
    petales += `<ellipse cx="50" cy="21" rx="9" ry="19" fill="${g}" stroke="rgba(0,0,0,.14)" stroke-width="1" transform="rotate(${i * 36} 50 50)"/>`;
  }
  return `<svg class="fleur-rare" viewBox="0 0 100 100">${petales}
    <circle cx="50" cy="50" r="16" fill="${g}" stroke="rgba(0,0,0,.18)" stroke-width="1"/>
    <circle cx="50" cy="50" r="8" fill="rgba(0,0,0,.12)"/>
    <ellipse class="glint" cx="43" cy="42" rx="6" ry="4" fill="rgba(255,255,255,.85)"/>
  </svg>`;
}
// 🍦 L'ARBRE À TICKETS GLACE : le vrai arbre que la fée fait pousser, avec les
// tickets glace BLEUS pendus aux branches (pas un emoji). Repris du dessin de la fée.
const TICKET_GLACE = `<rect x="2" y="2" width="166" height="100" rx="12" fill="url(#glaceTgJ)" stroke="#152c6b" stroke-width="3"></rect><rect x="10" y="12" width="106" height="80" rx="7" fill="#fff" stroke="#152c6b" stroke-width="1.6"></rect><text x="24" y="52" font-family="Arial,sans-serif" font-size="34" font-weight="900" fill="#1c1c1c" font-style="italic">1x</text><text x="18" y="72" font-family="Arial,sans-serif" font-size="15" font-weight="900" fill="#1c1c1c" font-style="italic">GRATUIT</text><path d="M118 60 L152 60 L135 98 Z" fill="#e8a94a" stroke="#152c6b" stroke-width="1.5"></path><path d="M116 58 C110 40 118 26 128 24 C126 12 146 8 150 20 C160 18 166 30 158 38 C166 44 158 58 150 56 Z" fill="#fdf6e6" stroke="#152c6b" stroke-width="1.6"></path>`;
function arbreGlaceSvg() {
  // 🍦 EXACTEMENT l'arbre à tickets glace que la fée fait pousser : un pot en
  // terre cuite + l'arbre avec ses tickets bleus « 1x GRATUIT ».
  const T = (x, y) => `<g transform="translate(${x},${y}) scale(0.3)">${TICKET_GLACE}</g>`;
  return `<svg class="arbre-glace" viewBox="40 24 140 236" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="feePotJ" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#C97B4A"/><stop offset="1" stop-color="#9C5730"/></linearGradient>
      <linearGradient id="glaceTgJ" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#5b9bf5"/><stop offset="1" stop-color="#1e40af"/></linearGradient>
    </defs>
    <rect x="102" y="98" width="16" height="74" rx="5" fill="#8A5B36"/>
    <circle cx="110" cy="60" r="40" fill="#2E7D3B"/><circle cx="76" cy="80" r="27" fill="#3C9147"/>
    <circle cx="144" cy="80" r="27" fill="#3C9147"/><circle cx="110" cy="78" r="31" fill="#4E9E52"/>
    ${T(46, 82)}${T(120, 86)}${T(84, 104)}
    <path d="M56 168 L164 168 L152 246 Q 110 254 68 246 Z" fill="url(#feePotJ)"/>
    <rect x="48" y="150" width="124" height="24" rx="7" fill="#D98A57"/>
    <ellipse cx="110" cy="172" rx="52" ry="9" fill="#5C3A21"/>
  </svg>`;
}

// 🎟️ Un ticket glace bleu seul (le « 1x GRATUIT » du site), pour les modules et
// les petits messages (là où l'arbre entier serait trop gros).
function ticketGlaceSvg(cls = "") {
  return `<svg class="ticket-glace ${cls}" viewBox="0 0 170 104" xmlns="http://www.w3.org/2000/svg">
    <defs><linearGradient id="glaceTgJ" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#5b9bf5"/><stop offset="1" stop-color="#1e40af"/></linearGradient></defs>
    ${TICKET_GLACE}</svg>`;
}

// Ce qui s'affiche dans une case : fleur métallique (rares), arbre à tickets glace,
// sinon l'emoji de la plante.
function visuelPlante(cle) {
  const p = PLANTES[cle];
  if (p && p.rare) return fleurRareSvg(p.rare);
  if (cle === "arbreglace") return arbreGlaceSvg();
  return p?.emoji || "🌿";
}

// Petite icône inline pour les messages : ticket glace (arbre), fleur rare, sinon emoji.
function iconePlante(cle) {
  if (cle === "arbreglace") return ticketGlaceSvg("tk-inline");
  const p = PLANTES[cle];
  if (p && p.rare) return `<span class="tk-inline">${fleurRareSvg(p.rare)}</span>`;
  return p?.emoji || "🌿";
}

// Classement des plus beaux jardins : par VALEUR totale des plantes posées.
function classementJardins() {
  const val = {};
  for (const k in jardin) {
    const c = jardin[k];
    if (/^Famiflora/.test(c.par)) continue;   // les plantations de l'organisateur ne comptent pas
    val[c.par] = (val[c.par] || 0) + (PLANTES[c.plante]?.cout || 0);
  }
  return Object.entries(val).map(([name, valeur]) => ({ name, valeur })).sort((a, b) => b.valeur - a.valeur);
}

function renderJardin() {
  clearInterval(tickTimer);

  // Pas encore identifié (nouveau téléphone) : on invite à retrouver sa carte.
  if (!joueur) {
    app.innerHTML = `${pillsHtml("jardin")}<div class="card center">
      <div style="font-size:2.6rem;">🌼</div>
      <h2 class="q-text" style="margin:8px 0;">Ton jardin t'attend</h2>
      <p class="hint">Crée ta carte de jardinier au quiz, ou retrouve-la avec ton pseudo + ton code.</p>
      <div style="display:flex; gap:10px; flex-wrap:wrap; justify-content:center;">
        <button class="btn" id="j-jouer">Créer ma carte 🌱</button>
        <button class="btn ghost" id="j-retrouver">J'ai déjà une carte</button>
      </div>
    </div>`;
    bindPills();
    $("#j-jouer").addEventListener("click", () => { userView = "auto"; quiz = null; render(); });
    $("#j-retrouver").addEventListener("click", () => { userView = "retrouver"; quiz = null; render(); });
    return;
  }

  // Le stade (🌰🌱🪴…) suit les graines RÉCOLTÉES au quiz — jamais le solde
  // disponible, sinon planter ferait « rapetisser » le joueur.
  const stade = stadeDe(joueur.recoltees ?? (joueur.solde + soldeDepense()));
  const nbPlantees = Object.keys(jardin).length;

  app.innerHTML = `${DEFS_METAL}<div class="board-wrap">${pillsHtml("jardin")}<div class="card">
    <div class="jardin-solde">
      <span style="display:flex; align-items:center; gap:8px;">${avatarDe(joueur.name)} <strong>${esc(joueur.name)}</strong> <span title="${esc(stade.nom)}" style="font-size:1.3rem;">${stade.emoji}</span></span>
      <span class="montant">${JARDIN_LIBRE ? "🎨 Aperçu — plantes offertes" : affG(joueur.solde) + " 🌰 à planter"}</span>
    </div>
    <div class="jardin-explik">
      <b>🌼 Ton jardin, comment ça marche ?</b>
      Choisis une plante dans le catalogue, puis tape une case libre pour la planter.
      Tape une plante déjà en terre pour la <b>revendre</b> et récupérer tes graines.
      Tu as ${JARDIN_CASES} cases rien qu'à toi (${nbPlantees} déjà occupée${nbPlantees > 1 ? "s" : ""}).
      <span class="je-rassure">💚 Ici, c'est <b>juste pour s'amuser</b>. En plantant, tu verras ton nombre de
      graines à planter diminuer : <b>c'est normal, ça ne concerne que le jardin</b>.
      <b>Ton score au classement ne bouge pas</b> — va voir dans « Classement », il sera toujours le même.</span>
    </div>
    ${JARDIN_LIBRE ? "" : `<div class="j-herbes-zone">
      <button class="btn" id="j-herbes">🌿 Gagner plus de graines</button>
      <span>Un mini-jeu rapide : ces graines-là servent aussi <b>uniquement au jardin</b>.</span>
    </div>`}
    <div class="catalogue">
      ${Object.entries(PLANTES).map(([cle, p]) => `
        <button class="plt ${p.rare ? "rare-" + p.rare : ""} ${planteChoisie === cle ? "choisi" : ""}" data-plt="${cle}" ${(!JARDIN_LIBRE && p.cout > joueur.solde) ? "disabled" : ""}>
          <span class="emo">${visuelPlante(cle)}</span>${esc(p.nom)}<br><span class="cout">${p.cout} 🌰</span>
        </button>`).join("")}
    </div>
    <div class="grille">
      ${Array.from({ length: JARDIN_CASES }, (_, i) => {
        const c = jardin[i];
        if (!c) return `<button class="case vide" data-case="${i}" aria-label="Case libre ${i + 1}"></button>`;
        const p = PLANTES[c.plante];
        return `<button class="case pleine ${p?.rare ? "rare-" + p.rare : ""}" data-info="${i}" title="${esc(p?.nom || c.plante)}">${visuelPlante(c.plante)}</button>`;
      }).join("")}
    </div>
    <div class="jardin-info" id="j-info">${jardinMsg ? esc(jardinMsg) : (planteChoisie ? `${iconePlante(planteChoisie)} ${esc(PLANTES[planteChoisie].nom)} sélectionné — tape une case libre !` : "")}</div>
  </div></div>`;
  bindPills();

  // Aller au mini-jeu pour récolter des graines (absent en mode aperçu gratuit).
  const jh = $("#j-herbes");
  if (jh) jh.addEventListener("click", () => { userView = "herbes"; render(); });

  // Choisir une plante dans le catalogue
  app.querySelectorAll("[data-plt]").forEach((b) => b.addEventListener("click", () => {
    planteChoisie = planteChoisie === b.dataset.plt ? null : b.dataset.plt;
    jardinMsg = null;
    renderJardin();
  }));

  // Une case occupée : afficher qui a planté quoi. Si c'est MA plante, je peux
  // la revendre pour récupérer mes graines.
  app.querySelectorAll("[data-info]").forEach((b) => b.addEventListener("click", () => {
    const idx = b.dataset.info;
    const c = jardin[idx];
    if (!c) return;
    const p = PLANTES[c.plante];
    const info = $("#j-info");
    // C'est TON jardin : toutes les plantes sont à toi, tu peux les revendre.
    info.innerHTML = `<span class="revente">${p ? iconePlante(c.plante) : "🌿"} ${esc(p?.nom || c.plante)}`
      + ` <button class="btn mini" id="j-revendre">Revendre +${p?.cout ?? 0} 🌰</button></span>`;
    $("#j-revendre").addEventListener("click", async () => {
      $("#j-revendre").disabled = true;
      const res = await apiRevendre(joueur.name, +idx).catch(() => ({ ok: false }));
      if (res.ok) {
        delete jardin[idx];
        if (res.solde != null) joueur.solde = res.solde;
        jardinMsg = `Plante revendue, +${affG(res.rendu)} 🌰 récupérées. Tu as ${affG(joueur.solde)} graines.`;
      } else {
        jardin = await apiJardin();
        jardinMsg = "Petit souci, réessaie.";
      }
      renderJardin();
    });
  }));

  // Une case libre : planter la plante choisie
  app.querySelectorAll("[data-case]").forEach((b) => b.addEventListener("click", async () => {
    if (!planteChoisie) {
      $("#j-info").textContent = "Choisis d'abord une plante dans le catalogue au-dessus 👆";
      return;
    }
    const idx = +b.dataset.case;
    b.disabled = true;
    const res = await apiPlanter(joueur.name, idx, planteChoisie).catch(() => ({ ok: false, reason: "erreur" }));
    if (res.ok) {
      jardin[idx] = { plante: planteChoisie, par: joueur.name, date: new Date().toISOString() };
      joueur.solde = res.solde;
      const p = PLANTES[planteChoisie];
      jardinMsg = JARDIN_LIBRE ? `${p.emoji} ${p.nom} planté !` : `${p.emoji} ${p.nom} planté ! Il te reste ${affG(joueur.solde)} graines.`;
      if (!JARDIN_LIBRE && p.cout > joueur.solde) planteChoisie = null; // plus les moyens pour la même
      renderJardin();
      const neuve = app.querySelector(`[data-info="${idx}"]`);
      if (neuve) { neuve.classList.add("neuve"); if (p.rare) etincellesSur(neuve); }
    } else {
      jardin = await apiJardin(); // on resynchronise la grille
      if (res.reason === "case_prise") jardinMsg = "Oups, cette case vient d'être prise par quelqu'un d'autre ! Tes graines te sont rendues.";
      else if (res.reason === "solde_insuffisant") { jardinMsg = "Il te manque des graines pour cette plante."; joueur.solde = res.solde ?? joueur.solde; }
      else jardinMsg = "Petit souci de connexion, réessaie !";
      renderJardin();
    }
  }));
}

// Total déjà dépensé par le joueur (retrouvé depuis le classement affiché).
function soldeDepense() {
  const p = board.find((x) => x.name.toLowerCase() === (joueur?.name || "").toLowerCase());
  return p ? (p.depensees || 0) : 0;
}

// ✨ Gerbe d'étincelles au-dessus d'une case : quand on plante une plante RARE.
function etincellesSur(el) {
  if (!el) return;
  const r = el.getBoundingClientRect();
  const cx = r.left + r.width / 2, cy = r.top + r.height / 2;
  for (let i = 0; i < 16; i++) {
    const s = document.createElement("span");
    s.className = "scintille";
    s.textContent = ["✨", "⭐", "💫", "🌟"][i % 4];
    s.style.left = cx + "px"; s.style.top = cy + "px";
    s.style.setProperty("--dx", (Math.random() * 100 - 50).toFixed(0) + "px");
    s.style.setProperty("--dy", (-15 - Math.random() * 80).toFixed(0) + "px");
    s.style.animationDelay = (Math.random() * 0.2).toFixed(2) + "s";
    document.body.appendChild(s);
    setTimeout(() => s.remove(), 1100);
  }
}

/* ============================================================
   🌿 MINI-JEU — LA CHASSE AUX MAUVAISES HERBES
   Une fois le quiz fini on ne récolte plus de graines au quiz : ce petit jeu
   permet d'en gagner d'AUTRES à planter (elles ne comptent pas au classement).
   Des herbes surgissent ~25 s ; on tape dessus. Les bronze/argent/or sont
   rares mais rapportent plus. Le serveur recalcule et plafonne le gain.
   ============================================================ */

const HERBE_DUREE = 25;
const HERBE_TIERS = [
  { k: "normale", val: 1,  p: 0.68 },
  { k: "bronze",  val: 3,  p: 0.22 },
  { k: "argent",  val: 6,  p: 0.08 },
  { k: "or",      val: 12, p: 0.02 },
];

// Coupe une partie en cours (changement d'écran, rejeu…) : sans ça, les timers
// continueraient de faire apparaître des herbes en arrière-plan.
function stopHerbes() {
  if (!HG) return;
  HG.timers.forEach((t) => { clearTimeout(t); clearInterval(t); });
  HG.timers = [];
  HG.running = false;
}

function renderHerbes() {
  clearInterval(tickTimer);
  stopHerbes();
  if (!joueur) { userView = "jardin"; render(); return; }  // pas identifié : retour jardin

  app.innerHTML = `<div class="board-wrap"><div class="card">
    <div class="herbe-top">
      <button class="btn ghost mini" id="h-retour">← Jardin</button>
      <span class="chrono" id="h-chrono">⏱ ${HERBE_DUREE} s</span>
      <span class="butin" id="h-butin">🌰 0</span>
    </div>
    <div class="herbe-zone" id="h-zone">
      <div id="h-overlay" class="herbe-overlay">
        <div style="font-size:2.4rem;">🌿</div>
        <h2 class="q-text" style="margin:0;">Chasse aux mauvaises herbes</h2>
        <p class="hint" style="margin:0; max-width:340px;">Tape un maximum de mauvaises herbes en ${HERBE_DUREE} s !
        Les <b style="color:#B87333;">bronze</b>, <b style="color:#8A9099;">argent</b> et <b style="color:#E9B21E;">or</b> sont rares mais rapportent gros.</p>
        <button class="btn" id="h-go">Commencer 🌱</button>
      </div>
    </div>
    <div class="jardin-info" id="h-info"></div>
  </div></div>`;
  $("#h-retour").addEventListener("click", () => { userView = "jardin"; render(); });
  $("#h-go").addEventListener("click", demarreHerbes);
}

function demarreHerbes() {
  const zone = $("#h-zone");
  const overlay = $("#h-overlay");
  if (!zone) return;
  if (overlay) overlay.remove();

  HG = { timers: [], counts: { normale: 0, bronze: 0, argent: 0, or: 0 }, butin: 0, restant: HERBE_DUREE, running: true };
  const chrono = $("#h-chrono"), butinEl = $("#h-butin");

  // Le décompte.
  HG.timers.push(setInterval(() => {
    HG.restant--;
    if (chrono) chrono.textContent = "⏱ " + Math.max(0, HG.restant) + " s";
    if (HG.restant <= 0) finHerbes();
  }, 1000));

  const tire = () => {
    let r = Math.random(), acc = 0;
    for (const t of HERBE_TIERS) { acc += t.p; if (r < acc) return t; }
    return HERBE_TIERS[0];
  };

  const spawn = () => {
    if (!HG || !HG.running || !zone.isConnected) return;
    const t = tire();
    const b = document.createElement("button");
    b.className = "herbe h-" + t.k;
    b.innerHTML = `🌿<span class="val">+${t.val}</span>`;
    const marge = 38;
    const x = marge + Math.random() * Math.max(1, zone.clientWidth - marge * 2);
    const y = marge + Math.random() * Math.max(1, zone.clientHeight - marge * 2);
    b.style.left = x + "px";
    b.style.top = y + "px";
    let vive = true;
    const enleve = setTimeout(() => { if (vive) b.remove(); }, 1150);
    HG.timers.push(enleve);
    b.addEventListener("pointerdown", (e) => {
      e.preventDefault();
      if (!vive || !HG || !HG.running) return;
      vive = false;
      clearTimeout(enleve);
      HG.counts[t.k]++;
      HG.butin += t.val;
      if (butinEl) butinEl.textContent = "🌰 " + HG.butin;
      b.classList.add("crunch");
      const g = document.createElement("div");
      g.className = "herbe-gain";
      g.textContent = "+" + t.val;
      g.style.left = x + "px"; g.style.top = y + "px";
      zone.appendChild(g);
      setTimeout(() => g.remove(), 700);
      setTimeout(() => b.remove(), 280);
    });
    zone.appendChild(b);
  };

  HG.timers.push(setInterval(spawn, 620));
  spawn();
}

async function finHerbes() {
  if (!HG || !HG.running) return;
  HG.running = false;
  HG.timers.forEach((t) => { clearTimeout(t); clearInterval(t); });
  HG.timers = [];
  const zone = $("#h-zone");
  if (zone) zone.querySelectorAll(".herbe").forEach((e) => e.remove());

  const counts = HG.counts;
  const res = await apiRecolteHerbes(joueur.name, counts).catch(() => ({ ok: false }));
  const gagne = res.ok ? res.gain : 0;
  if (res.ok && res.solde != null) joueur.solde = res.solde;

  if (zone && zone.isConnected) {
    const o = document.createElement("div");
    o.id = "h-overlay";
    o.className = "herbe-overlay";
    o.innerHTML = `<div style="font-size:2.6rem;">🌱</div>
      <h2 class="q-text" style="margin:0;">+${gagne} graines récoltées !</h2>
      <p class="hint" style="margin:0;">${res.ok ? `Tu as maintenant <b>${affG(joueur.solde)}</b> graines à planter.` : "La récolte n'a pas pu être enregistrée, réessaie."}
      ${gagne >= 80 ? "<br>Plafond de la partie atteint 🌟" : ""}</p>
      <div style="display:flex; gap:10px; flex-wrap:wrap; justify-content:center;">
        <button class="btn" id="h-rejouer">Rejouer 🌿</button>
        <button class="btn ghost" id="h-aujardin">Planter mes graines 🌼</button>
      </div>`;
    zone.appendChild(o);
    $("#h-rejouer").addEventListener("click", renderHerbes);

  }
}

// 🎯 Indice « où chercher » : les zones où l'orga a caché des codes. Affiché à

// reste visible pendant l'événement pour aider à dénicher les codes.
function zonesDispoLe() { return CONFIG.dateLancement.getTime() - 86400000; }   // veille du lancement
// Moment lisible, ex. « 28/07 à 12h ».
function labelMoment(ts) {
  const d = new Date(ts);
  const h = d.getMinutes() ? `${d.getHours()}h${pad(d.getMinutes())}` : `${d.getHours()}h`;
  return `${pad(d.getDate())}/${pad(d.getMonth() + 1)} à ${h}`;
}
function zonesHintHtml() {
  const zones = (CONFIG.zones || []).filter((z) => z.nom && z.nb > 0);
  // Avant l'ouverture : le bloc est TOUJOURS visible (même si les zones ne sont
  // pas encore renseignées côté admin), mais verrouillé — au clic on dit quand il
  // sera dispo. C'est ce qui garantit un affichage identique partout.
  if (Date.now() < zonesDispoLe()) {
    return `<button class="zones-hint zones-lock" id="rc-indice">
      <div class="zh-titre">🔒 Indices : où chercher les codes</div>
      <div class="zh-lock">Bientôt disponible — appuie pour savoir quand</div>
    </button>`;
  }
  return `<div class="zones-hint">
    <div class="zh-titre">🎯 Où chercher les codes</div>
    ${zones.map((z) => `<div class="zh-row"><span>${esc(z.nom)}</span><span>${z.nb} code${z.nb > 1 ? "s" : ""}</span></div>`).join("")}
  </div>`;
}

      <button class="btn" id="rc-ok">Vérifier ce code 🎁</button>
      ${zonesHintHtml()}
      ${retourHtml()}
    </div>`;
    if (joueur) bindPills();
    brancheRetour();
    const bi = $("#rc-indice");
    if (bi) bi.addEventListener("click", modaleIndices);
    $("#rc-explik").addEventListener("click", ouvreExplicationCodes);
    apiCodesRestants().then((cr) => {
      const el = $("#rc-restants");
      if (el && cr && cr.restants != null) {
        el.innerHTML = cr.restants > 0
          ? `🔎 Il reste <b>${cr.restants}</b> code${cr.restants > 1 ? "s" : ""} à trouver en magasin !`
          : `✅ Tous les codes ont été trouvés — bravo à tous !`;
      }
    });
    const go = () => { const v = $("#rc-in").value.trim().toUpperCase(); if (v) { codeAReclamer = v; renderReclamer(); } };
    $("#rc-ok").addEventListener("click", go);
    $("#rc-in").addEventListener("keydown", (e) => e.key === "Enter" && go());
    return;
  }

  const st = await apiCodeStatus(code, joueur ? joueur.name : "").catch(() => ({ connu: false }));

  if (!st.connu) {
    modaleCode("❓", "Code inconnu", "« " + esc(code) + " » n'est pas un code valide. Vérifie bien l'orthographe.");
    return;
  }
  if (st.pris && st.parMoi) {
    modaleCode("😉", "Tu as déjà ce code !", "Ce bonus est déjà dans ton jardin. Va en chercher d'autres en magasin !");
    return;
  }
  if (st.pris) {
    modaleCode("🥀", "Dommage…", "Ce code a déjà été utilisé… ou planté, qui sait ! 🌱 Cherche-en un autre en magasin, il y en a d'autres à trouver.");
    return;
  }

  // Code disponible mais pas encore identifié : GROSSE FENÊTRE de félicitations,
  // avec 2 modules (se connecter / créer un compte). Le code est mis de côté et
  // les graines sont créditées automatiquement une fois la connexion réussie.
  if (!joueur) {
    metCodeAttente(code);
    app.innerHTML = `<div class="card center"><div style="font-size:2.4rem;">🎁</div>
      <h2 class="q-text">Code valide !</h2><p class="hint">On y est presque…</p></div>`;
    const o = document.createElement("div");
    o.className = "modal-fond";
    o.innerHTML = `<div class="modal code-modal">
      <div class="cm-emoji">🎉</div>
      <h2 class="cm-titre">Félicitations !</h2>
      <p class="cm-sous">Vous avez trouvé un code bonus — <b>+${CONFIG.pointsParCodeBonus} 🌰</b> à récupérer.</p>
      <p class="cm-consigne">Connectez-vous pour récupérer vos graines</p>
      <div class="cm-modules">
        <button class="cm-mod" data-cm="login"><span class="cm-mod-emo">🔑</span><span class="cm-mod-titre">Je me connecte</span></button>
        <button class="cm-mod" data-cm="signup"><span class="cm-mod-emo">🌱</span><span class="cm-mod-titre">Je crée mon compte</span></button>
      </div>
    </div>`;
    document.body.appendChild(o);
    o.querySelector('[data-cm="login"]').addEventListener("click", () => { o.remove(); codeAReclamer = null; userView = "retrouver"; quiz = null; render(); });
    o.querySelector('[data-cm="signup"]').addEventListener("click", () => { o.remove(); codeAReclamer = null; userView = "auto"; quiz = null; render(); });
    o.addEventListener("click", (e) => { if (e.target === o) { o.remove(); if (retourAccueilBorne()) return; codeAReclamer = null; userView = "reclamer"; render(); } });
    return;
  }

  // Identifié + code disponible : bouton « Récupérer ».
  app.innerHTML = `${pillsHtml("reclamer")}<div class="card center"><div style="font-size:2.6rem;">🎁</div>
    <h2 class="q-text">Code disponible !</h2>
    <p class="hint"><b>${esc(code)}</b> — ajoute-le à ton compte pour +${CONFIG.pointsParCodeBonus} 🌰.
    Tu peux avoir ${CONFIG.maxCodes} codes maximum (tu en as ${joueur.nbCodes ?? 0}).</p>
    <div id="rc-msg"></div>
    <button class="btn" id="rc-recup">Récupérer ce code 🎁</button>${retourHtml()}</div>`;
  bindPills(); brancheRetour();
  $("#rc-recup").addEventListener("click", async () => {
    $("#rc-recup").disabled = true;
    const res = await apiCodeClaim(joueur.name, joueur.code, code).catch(() => ({ ok: false }));
    const m = $("#rc-msg");
    if (res.ok) {
      joueur.solde = res.solde; joueur.recoltees = res.recoltees; joueur.nbCodes = res.nbCodes;
      board = await apiGetBoard();
      videCodeAttente(); codeAReclamer = null;
      m.innerHTML = `<div class="alert ok">Bravo ! +${res.gagne} graines 🎉 Tu as ${res.nbCodes}/${CONFIG.maxCodes} code(s).</div>`;
      $("#rc-recup").textContent = "C'est fait ✅";
    } else if (res.reason === "max_atteint") { m.innerHTML = `<div class="alert">Tu as déjà atteint le maximum de ${CONFIG.maxCodes} codes 🌱</div>`; }
    else if (res.reason === "deja_a_toi") { m.innerHTML = `<div class="alert">Tu as déjà récupéré ce code 😉</div>`; }
    else if (res.reason === "deja_pris") { m.innerHTML = `<div class="alert">Trop tard, quelqu'un vient de le prendre ! 🏃</div>`; }
    else if (res.reason === "auth") { oublieMoi(); m.innerHTML = `<div class="alert">Session expirée, reconnecte-toi.</div>`; }
    else { m.innerHTML = `<div class="alert">Petit souci, réessaie.</div>`; $("#rc-recup").disabled = false; }
  });
}

// La librairie QR (~56 Ko) n'est chargée QUE pour l'écran télé — jamais pour
// les joueurs. Le QR encode l'adresse du quiz (sans le ?simulation).
let qrCharge = null, qrCache = null;
function chargeQR() {
  if (window.qrcode) return Promise.resolve();
  if (qrCharge) return qrCharge;
  qrCharge = new Promise((res, rej) => {
    const s = document.createElement("script");
    s.src = "qrcode.js"; s.onload = res; s.onerror = rej;
    document.head.appendChild(s);
  });
  return qrCharge;
}
async function qrQuiz() {
  if (qrCache) return qrCache;
  await chargeQR();
  const url = "https://famiformation.com/quiz";   // adresse publique des joueurs
  const qr = qrcode(0, "M");
  qr.addData(url);
  qr.make();
  qrCache = { svg: qr.createSvgTag(6, 2), url };
  return qrCache;
}

// 📺 Écran télé (kiosque) : boucle « fin du chrono » → « score + QR + lien ».
function renderSimTele() {
  const demo = [
    { name: "Sophie", score: 260 }, { name: "Karim", score: 230 }, { name: "Élodie", score: 210 },
    { name: "Tom", score: 180 }, { name: "Nadia", score: 150 }, { name: "Luc", score: 120 },
  ];

  // La plante grandit AU RYTHME du décompte : on voit la graine devenir un arbre,
  // qui fleurit puis donne son fruit à la fin (le fameux « arbre qui a fini de grandir »).
  function arbreCourt(s) {
    if (s <= 0)  return "🌳🍎";   // fruit : c'est parti !
    if (s <= 2)  return "🌳🌸";   // l'arbre fleurit
    if (s <= 4)  return "🌳";     // grand arbre
    if (s <= 7)  return "🌿";
    if (s <= 10) return "🪴";
    if (s <= 13) return "🌱";
    return "🌰";                  // la graine, au départ
  }

  function phaseChrono() {
    let n = 15;
    app.innerHTML = `<div class="tv">
      <div class="tv-phase">🚀 Ça commence dans…</div>
      <div class="tv-chrono" id="tvC">${n}</div>
      <div class="tv-tree" id="tvTree">${arbreCourt(n)}</div>
      <div class="tv-sub">Regarde l'arbre grandir… 🌱</div>
    </div>`;
    FEE.start();   // la fée est là aussi dans l'aperçu télé
    const it = setInterval(() => {
      const c = document.getElementById("tvC"), tr = document.getElementById("tvTree");
      if (!c) { clearInterval(it); return; }
      n--;
      if (tr) tr.textContent = arbreCourt(n);
      if (n > 0) { c.textContent = n; }
      else {
        c.textContent = "🎉"; clearInterval(it);
        // on laisse admirer l'arbre fini quelques secondes avant le classement
        simTimers.push(setTimeout(phaseScore, 2800));
      }
    }, 1000);
    simTimers.push(it);
  }

  async function phaseScore() {
    FEE.stop();
    const q = await qrQuiz().catch(() => null);
    app.innerHTML = `<div class="tv">
      <div class="tv-phase">🏆 Le grand quiz Famiformation</div>
      <div class="tv-cols">
        <div class="tv-board">
          ${demo.map((p, i) => `<div class="tv-row"><span>${medals[i] || (i + 1) + "."} ${esc(p.name)}</span><span>${affG(p.score)} 🌰</span></div>`).join("")}
        </div>
        <div class="tv-qr">
          <div class="tv-qr-box">${q ? q.svg : "<div style='padding:40px'>QR…</div>"}</div>
          <div class="tv-scan">📱 Scanne pour jouer !</div>
          <div class="tv-url">${esc(q ? q.url : "")}</div>
        </div>
      </div>
    </div>`;
    simTimers.push(setTimeout(phaseChrono, 12000));   // puis on reboucle sur le chrono
  }

  phaseChrono();
}

/* ============================================================

   AVANT le lancement, il montre EXACTEMENT le compte à rebours de la page joueur

   renderCountdown(). APRÈS le lancement, il montre le classement en direct + QR.
   La bascule est gérée par render() selon la phase.
   ============================================================ */
async function renderTeleBoard() {
  document.body.classList.add("mode-tele");
  FEE.stop();   // une fois le quiz lancé, la fée range sa baguette
  board = await apiGetBoard().catch(() => board);
  const q = await qrQuiz().catch(() => null);
  const top = board.filter((p) => p.quiz_fait !== false && !COMPTES_TEST.includes((p.name || "").toLowerCase())).slice(0, 8);
  const termine = phaseNow() === "termine";
  app.innerHTML = `<div class="tv">
    <div class="tv-phase">${termine ? "🏆 Classement final" : "🏆 Le classement en direct"}</div>
    <div class="tv-cols">
      <div class="tv-board">
        ${top.length ? top.map((p, i) => `<div class="tv-row"><span>${medals[i] || (i + 1) + "."} ${esc(p.name)}</span><span>${affG(p.score)} 🌰</span></div>`).join("")

    const ph = phaseNow();

}

  if (bb) bb.addEventListener("click", () => { userView = "board"; quiz = null; render(); });

  // de baguette, la graine tombe puis devient la plante. Renvoie l'instant OU la
  // pousse est finie, pour enchainer proprement.
  function faitPousser(cle, spotVw, t) {
    timers.push(setTimeout(() => feePres(spotVw), t));
    timers.push(setTimeout(() => coupDeBaguette(), t + 1500));
    timers.push(setTimeout(() => seme(cle, spotVw), t + 1500 + 650));
    return t + 1500 + 650 + 3200;
  }

  // 📣 GRANDE ANNONCE plein écran — toutes les 2 min, UNE FOIS son tour terminé
  // (elle est alors dans son coin). Deux messages en ALTERNANCE : les codes qu'il
  // reste à trouver, puis les récompenses à gagner. Durée totale : 10 s.
  // Elle annonce TOUS LES 2 CYCLES : la fée finit sa tournée, repart dans son
  // coin, et une fois sur deux l'annonce part de là. (En simulation, à chaque
  // cycle, pour ne pas attendre pour tester.)
  const CYCLES_PAR_ANNONCE = SIMULATION ? 1 : 2;
  let cyclesDepuisAnnonce = 0, annonceAlt = 0;
  async function grandeAnnonce() {
    const codesDabord = (annonceAlt++ % 2 === 0);
    let titre = "", detail = "";
    if (codesDabord) {
      const cr = await apiCodesRestants().catch(() => null);
      if (!cr || cr.restants == null || !actif) return;
      titre  = cr.restants > 0 ? `Il reste ${cr.restants} code${cr.restants > 1 ? "s" : ""} à trouver !`
                               : "Tous les codes ont été trouvés !";
      detail = cr.restants > 0 ? "Cachés un peu partout dans le magasin 👀 — chacun rapporte des graines"
                               : "Bravo à toutes les chasseuses et tous les chasseurs !";
    } else {
      const lots = (CONFIG.recompenses || []).filter(Boolean);
      titre  = "Des récompenses à gagner !";
      detail = lots.length
        ? lots.map((l, i) => `${["🥇", "🥈", "🥉"][i] || "🎁"} ${esc(l)}`).join("<br>")
        : "Pour les 3 meilleures récoltes du quiz 🏆";
    }
    if (!actif) return;
    const o = document.createElement("div");
    o.className = "anim-tele";
    o.innerHTML = `<div class="anim-cd" id="anim-cd"></div>
      <div class="anim-scene">
        <div class="anim-fee">${FEE_SVG}</div>
        <div class="anim-bloc">
          <div class="anim-titre">${titre}</div>
          <div class="anim-detail">${detail}</div>
        </div>
      </div>`;
    document.body.appendChild(o);
    requestAnimationFrame(() => o.classList.add("on"));   // transition d'entrée en douceur
    // Le compte à rebours continue, en petit, tout en haut au milieu.
    const majCd = () => {
      const el = document.getElementById("anim-cd");
      if (!el) return;
      const diff = Math.max(0, CONFIG.dateLancement.getTime() - Date.now());
      const j = Math.floor(diff / 86400000), h = Math.floor((diff % 86400000) / 3600000);
      const m = Math.floor((diff % 3600000) / 60000), sec = Math.floor((diff % 60000) / 1000);
      el.textContent = `🚀 Lancement dans ${j} j ${pad(h)}:${pad(m)}:${pad(sec)}`;
    };
    majCd();
    const tCd = setInterval(majCd, 1000);
    timers.push(tCd);
    timers.push(setTimeout(() => o.classList.remove("on"), 9300));      // fondu de sortie
    timers.push(setTimeout(() => { clearInterval(tCd); o.remove(); }, 10000));
  }

  function cycle() {
    if (!actif) return;
    semis.forEach(fane); semis = [];
    seTait();

    // Ecrans « mouvement reduit » : la fee reste dans son coin et se contente de parler.
    if (reduit) {
      coin();
      // Quelques plantes POSÉES (sans animation, le CSS les fige) pour que la
      // scène ne paraisse pas vide/cassée sur un téléphone en économie d'énergie.
      const deco = tournee4();
      seme(deco[0], SPOTS[0]); seme(deco[1], SPOTS[3]);
      let i = 0; const pool = PHRASES_PRESENTE.concat(PHRASES_EVENT);
      parle(pool[0]);
      timers.push(setInterval(() => { i = (i + 1) % pool.length; parle(pool[i]); }, 7000));
      return;
    }

    const plantes = tournee4();
    let t = 700;                 // un temps de repos dans le coin d'abord
    coin();

    // 1) elle fait pousser 2 plantes (chacune a cote d'elle)
    t = faitPousser(plantes[0], SPOTS[0], t);
    t = faitPousser(plantes[1], SPOTS[1], t);

    // 2) elle va au centre en bas et se presente : UNE phrase, ~5 s
    timers.push(setTimeout(() => basCentre(), t));
    timers.push(setTimeout(() => parle(auHasard(PHRASES_PRESENTE)), t + 1500));
    timers.push(setTimeout(() => seTait(), t + 1500 + 5000));
    t += 1500 + 5000 + 400;

    // 3) elle fait pousser 2 nouvelles plantes
    t = faitPousser(plantes[2], SPOTS[2], t);
    t = faitPousser(plantes[3], SPOTS[3], t);

    // 4) retour au centre : UNE phrase qui titille sur les recompenses, affichee 10 s
    timers.push(setTimeout(() => basCentre(), t));
    timers.push(setTimeout(() => parle(auHasard(PHRASES_EVENT)), t + 1500));
    timers.push(setTimeout(() => seTait(), t + 1500 + 10000));
    t += 1500 + 10000;

    // 5) elle repart dans le coin, le jardin s'efface, puis elle patiente 10 s
    //    dans le coin. Un cycle sur deux, pendant cette pause, elle lance sa
    //    grande annonce plein écran (codes restants / récompenses).
    timers.push(setTimeout(() => {
      coin(); semis.forEach(fane); semis = [];
      // Tous les 2 cycles, une fois le tour FINI : la grande annonce plein écran.
      if (++cyclesDepuisAnnonce >= CYCLES_PAR_ANNONCE) { cyclesDepuisAnnonce = 0; grandeAnnonce(); }
    }, t + 300));
    timers.push(setTimeout(cycle, t + 300 + 10000));
  }

  function start() {
    if (actif) return;
    actif = true;
    if (!racine) {
      racine = document.createElement("div");
      racine.id = "feeFly";
      racine.innerHTML = FEE_SVG;
      document.body.appendChild(racine);
      bulle = document.createElement("div");
      bulle.id = "feeBulle";
      document.body.appendChild(bulle);
    }
    racine.style.display = "block";
    // Premier placement sans glissade : on coupe la transition un instant.
    racine.style.transition = "none";
    coin();
    void racine.offsetWidth;
    racine.style.transition = "";
    cycle();
  }

  function stop() {
    actif = false;
    timers.forEach((t) => { clearTimeout(t); clearInterval(t); });
    timers = [];
    semis.forEach((el) => el.remove()); semis = [];
    if (racine) { racine.style.display = "none"; racine.classList.remove("cast"); }
    if (bulle) { bulle.classList.remove("on"); }
    document.querySelectorAll(".fee-et").forEach((el) => el.remove());
  }

  return { start, stop, svg: FEE_SVG };
})();

/* ============================================================
   🥚 EASTER EGGS
   • "graine"    → pluie de graines.        Mobile : secouer le téléphone.
   • "famiflora" → la fée fait un p'tit show. Mobile : taper 5 fois.
   • "2026"      → badge Famiformation 2026.  Mobile : glisser ↑ ↓ → ←.
   ============================================================ */
const EGG = (() => {
  let occupe = false;   // un seul effet à la fois

  function layer() {
    const l = document.createElement("div");
    l.className = "egg-layer";
    document.body.appendChild(l);
    return l;
  }
  // Pluie d'emojis qui tombent du haut de l'écran.
  function pluie(emojis, n, duree, cible) {
    const l = cible || layer();
    for (let i = 0; i < n; i++) {
      const s = document.createElement("div");
      s.className = "egg-fall";
      s.textContent = emojis[Math.floor(Math.random() * emojis.length)];
      s.style.left = Math.random() * 100 + "vw";
      s.style.fontSize = (1.1 + Math.random() * 1.7) + "rem";
      s.style.animationDuration = (duree * (0.7 + Math.random() * 0.6)) + "s";
      s.style.animationDelay = (Math.random() * duree * 0.5) + "s";
      s.style.setProperty("--rot", (Math.random() * 720 - 360) + "deg");
      l.appendChild(s);
    }
    return l;
  }
  function ferme(l, ms) { setTimeout(() => l.remove(), ms); }

  function grainePluie() {
    if (occupe) return; occupe = true;
    const l = pluie(["🌱", "🌰", "🍀"], 64, 3.4);
    ferme(l, 5200); setTimeout(() => occupe = false, 3600);
  }
  function famiflora() {
    if (occupe) return; occupe = true;
    const l = pluie(["✨", "🌸", "🌼", "💫", "🦋", "🌷"], 72, 3.6);
    const f = document.createElement("div");
    f.className = "egg-fairy";
    f.innerHTML = (typeof FEE !== "undefined" && FEE.svg) ? FEE.svg : "🧚";
    l.appendChild(f);
    ferme(l, 5400); setTimeout(() => occupe = false, 4200);
  }
  function badge() {
    if (occupe) return; occupe = true;
    const l = pluie(["✨", "🎉", "⭐", "🌟"], 52, 3.6);
    const b = document.createElement("div");
    b.className = "egg-badge";
    b.innerHTML = `<div class="disque"><div class="halo"></div><div class="an">2026</div><div class="marque">FAMIFORMATION</div></div>`;
    l.appendChild(b);
    ferme(l, 5600); setTimeout(() => occupe = false, 4400);
  }

  const MOTS = { "graine": grainePluie, "famiflora": famiflora, "2026": badge };

  // Clavier (ordinateur) : on retient les dernières frappes.
  let buf = "";
  window.addEventListener("keydown", (e) => {
    if (e.target && /input|textarea/i.test(e.target.tagName)) return;  // pas pendant une saisie
    if (!e.key || e.key.length !== 1) return;
    buf = (buf + e.key.toLowerCase()).slice(-14);
    for (const mot in MOTS) { if (buf.endsWith(mot)) { buf = ""; MOTS[mot](); break; } }
  });

  // Mobile — « famiflora » : 5 tapes rapides (hors boutons/liens/champs).
  let taps = 0, tapT = null;
  window.addEventListener("pointerdown", (e) => {
    if (e.target && e.target.closest && e.target.closest("button, a, input")) return;
    taps++;
    clearTimeout(tapT);
    tapT = setTimeout(() => { taps = 0; }, 1200);
    if (taps >= 5) { taps = 0; famiflora(); }
  });

  // Mobile — « 2026 » : glisser ↑ ↓ → ← dans l'ordre.
  const SEQ = ["haut", "bas", "droite", "gauche"];
  let seqPos = 0, sx = 0, sy = 0;
  window.addEventListener("touchstart", (e) => {
    const t = e.changedTouches[0]; sx = t.clientX; sy = t.clientY;
  }, { passive: true });
  window.addEventListener("touchend", (e) => {
    const t = e.changedTouches[0];
    const dx = t.clientX - sx, dy = t.clientY - sy;
    if (Math.abs(dx) < 45 && Math.abs(dy) < 45) return;   // simple tape, pas un glissé
    const dir = Math.abs(dx) > Math.abs(dy) ? (dx > 0 ? "droite" : "gauche") : (dy > 0 ? "bas" : "haut");
    if (dir === SEQ[seqPos]) { seqPos++; if (seqPos === SEQ.length) { seqPos = 0; badge(); } }
    else { seqPos = (dir === SEQ[0]) ? 1 : 0; }
  }, { passive: true });

  // Mobile — « graine » : secouer le téléphone. Sur Android/desktop le capteur
  // est accessible directement. Sur iOS, il faudrait une permission déclenchée
  // par un geste : on NE la demande PAS automatiquement (ce serait une pop-up
  // dès la première tape, pour tout le monde). La secousse reste donc en veille
  // sur iPhone — le clavier « graine » et les autres easter eggs marchent partout.
  let dernSecousse = 0;
  function onShake(e) {
    const a = e.accelerationIncludingGravity;
    if (!a) return;
    const force = Math.abs(a.x || 0) + Math.abs(a.y || 0) + Math.abs(a.z || 0);
    const now = Date.now();
    if (force > 34 && now - dernSecousse > 1500) { dernSecousse = now; grainePluie(); }
  }
  if (typeof DeviceMotionEvent !== "undefined" && typeof DeviceMotionEvent.requestPermission !== "function") {
    window.addEventListener("devicemotion", onShake);
  }

  return { grainePluie, famiflora, badge };
})();

/* ============================================================
   🌳 ROUTEUR
   ============================================================ */

function render() {
  // 📺 Écran télé : AVANT le lancement, on affiche le VRAI compte à rebours de la
  // page joueur (avec la fée) ; APRÈS, le classement en direct. La bascule se fait
  // toute seule (le tick du compte à rebours rappelle render() à zéro).
  if (ECRAN === "tele") {
    document.body.classList.add("mode-tele");
    stopHerbes();
    if (phaseNow() === "avant") {
      // Dans les 10 dernières secondes on entre direct sur les gros chiffres
      // (sinon compte à rebours complet avec la fée).
      const diff = CONFIG.dateLancement.getTime() - Date.now();
      if (diff <= 10000) teleFinal();
      else { FEE.start(); renderCountdown(); }
    } else if (phaseNow() === "termine") { renderTeleWinners(); }   // fin : les 3 vainqueurs
    else { renderTeleBoard(); }
    return;
  }
  // En simulation, les écrans de prévisualisation (menu/télé/code) passent avant
  // tout. Le mode « joueur » (et sa suite jardin/mini-jeu) suit le flux normal.
  // Aperçu daté : on NE montre PAS le menu de simulation, on rend le VRAI écran
  // (télé / borne / téléphone) tel qu'il sera au moment simulé.
  if (SIMULATION && !APERCU) {
    majBarreSim();
    if (simMode !== "joueur" && simMode !== "jardin") {
      FEE.stop(); stopHerbes(); clearInterval(tickTimer);
      renderSim();
      return;
    }
    stopSim();
  }
  const v = currentView();
  // La fée n'accompagne QUE l'écran télé : sur le téléphone/ordi, pas de fée.
  FEE.stop();
  // On quitte le mini-jeu : couper la partie en cours (timers d'apparition).
  if (v !== "herbes") stopHerbes();
  if (v === "home") renderHome();
  else if (v === "espace") renderEspace();
  else if (v === "creation") renderCreation();
  else if (v === "dashboard") renderDashboard();
  else if (v === "quiz") renderQuiz();
  else if (v === "jardin") renderJardin();
  else if (v === "herbes") renderHerbes();
  else if (v === "retrouver") renderRetrouver();
  else if (v === "reclamer") renderReclamer();
  else renderBoard();
}

(async () => {
  // Les questions viennent du serveur (saisies dans /quiz/admin). Si l'appel
  // échoue, QUESTIONS garde la liste de secours définie plus haut. Le catalogue
  // des plantes vient aussi du serveur : page et api.php restent d'accord sur
  // les coûts même si tu les modifies dans api.php.
  const [dist, bd, cat, conf] = await Promise.all([apiQuestions(), apiGetBoard(), apiPlantes(), apiConfig()]);
  if (dist) { QUESTIONS = dist; }
  if (cat && cat.plantes) { PLANTES = cat.plantes; JARDIN_CASES = cat.cases || JARDIN_CASES; }
  // Dates de l'événement réglées dans l'admin (sinon on garde celles de CONFIG).
  if (conf) {
    if (conf.lancement) CONFIG.dateLancement = new Date(conf.lancement);
    if (conf.cloture)   CONFIG.dateCloture = new Date(conf.cloture);
    if (conf.resultats) CONFIG.dateResultats = conf.resultats;
    CONFIG.zones = Array.isArray(conf.zones) ? conf.zones : [];
    CONFIG.recompenses = Array.isArray(conf.recompenses) ? conf.recompenses : [];
    CONFIG.version = conf.version || "";   // sert à la télé pour se recharger après une mise en ligne
  }
  // En simulation, des zones de démo pour tester l'affichage « où chercher » à J-1.
  if (SIMULATION && (!CONFIG.zones || !CONFIG.zones.length)) {
    CONFIG.zones = [{ nom: "Rayon fleurs", nb: 4 }, { nom: "Caisses", nb: 2 }, { nom: "Entrée du magasin", nb: 3 }];
  }
  board = bd;

  // 🎬 En SIMULATION, on garnit le classement avec des joueurs de démo (si vide)
  // pour pouvoir TOUT tester : classement en direct, podium des 3 vainqueurs à la
  // clôture, etc. Rien n'est envoyé au serveur (mode simulation).
  if (SIMULATION) {
    // Des joueurs de démo seulement si le classement est quasi vide (sinon on
    // garde les vrais, plus réalistes pour l'aperçu).
    if (board.length < 3) {
      const demo = (name, score, correct, codes) => ({ name, code: "0000", nom: "", score, bonus: 0, depensees: 0, correct, codes, codes_pris: [], time: 300 - score, quiz_fait: true });
      board = [demo("Marie", 240, 12, 2), demo("Lucas", 190, 10, 1), demo("Emma", 150, 8, 1),
               demo("Tom", 110, 6, 0), demo("Sofia", 80, 5, 0), demo("Noah", 50, 3, 0)].concat(board);
    }
    // 🧪 COMPTE DE TEST « Testeur / 0000 » : TOUJOURS présent en simulation (quel
    // que soit le nombre de vrais joueurs). Score réaliste au classement (130) mais
    // gros « bonus » dépensable (2000) — le bonus ne compte pas au classement, donc
    // il ne fausse rien tout en pouvant s'offrir TOUTES les plantes.
    if (!board.some((p) => (p.name || "").toLowerCase() === "testeur")) {
      board.push({ name: "Testeur", code: "0000", nom: "Compte de test", score: 130, bonus: 2000,
        depensees: 0, correct: 9, codes: 0, codes_pris: [], time: 140, quiz_fait: true });
    }
    simPret.board = true;   // apiGetBoard renverra cette liste (pas de fetch réel)
  }

  // 🧪 Connexion AUTOMATIQUE au compte de test (bouton de l'admin) : zéro saisie,
  // on arrive directement sur le tableau de bord, tout débloqué.
  if (SIMULATION && SIM_PARAMS.get("compte") === "testeur") {
    const t = board.find((p) => (p.name || "").toLowerCase() === "testeur");
    if (t) {
      joueur = { name: t.name, code: t.code, recoltees: t.score, nbCodes: 0, quizFait: true,
                 solde: t.score + (t.bonus || 0) - (t.depensees || 0) };
      jardin = {};
      userView = "dashboard";
      render();
      return;
    }
  }

  // 🎨 Aperçu « mon jardin » pour l'admin : joueur de démo, entrée directe dans le
  // jardin, plantes gratuites (prix affichés). On court-circuite tout le reste.
  if (JARDIN_LIBRE) {
    joueur = { name: "Aperçu", code: "0000", solde: 999, recoltees: 999, nbCodes: 0, quizFait: true };
    jardin = {};
    userView = "jardin";
    render();
    return;
  }

  // 📺 La TÉLÉ garde son spectacle (compte à rebours + fée, puis classement).
  // Toutes les transitions se font TOUTES SEULES côté navigateur (aucun
  // rechargement nécessaire). Par sécurité, on re-synchronise les dates de
  // l'événement toutes les 60 s : si tu changes l'heure dans l'admin, la télé
  // s'ajuste sans qu'on ait à recharger la page.
  if (ECRAN === "tele") {
    if (!SIMULATION) {
      const versionAuChargement = CONFIG.version || "";
      setInterval(async () => {
        const c = await apiConfig().catch(() => null);
        if (!c) return;
        if (c.lancement) CONFIG.dateLancement = new Date(c.lancement);
        if (c.cloture)   CONFIG.dateCloture = new Date(c.cloture);
        if (c.resultats) CONFIG.dateResultats = c.resultats;
        CONFIG.recompenses = Array.isArray(c.recompenses) ? c.recompenses : [];
        // 🔄 Une télé reste allumée des jours entiers : sans ça, elle garderait
        // l'ancienne page indéfiniment après une mise en ligne. Dès que la
        // version du site change, elle se recharge TOUTE SEULE — mais jamais
        // pendant une annonce ni dans la dernière heure avant le lancement.
        const enPleineAnnonce = !!document.querySelector(".anim-tele");
        const bientot = CONFIG.dateLancement.getTime() - Date.now() < 3600000;
        if ((c.version || "") !== versionAuChargement && !enPleineAnnonce && !bientot) location.reload();
      }, 60000);
    }
    render();
    return;
  }

  // 🖥️ La BORNE : appareil partagé → pas d'auto-reconnaissance (chacun repart de
  // zéro) et accueil SANS compte à rebours. Le même render() que le téléphone.
  if (ECRAN === "borne") {
    try { sessionStorage.setItem("fj_borne", "1"); } catch (e) {}
    render();
    return;
  }

  // 🧹 On arrive sur /quiz DIRECTEMENT (téléphone/ordi, pas depuis la borne) : on
  // oublie le mode borne d'une éventuelle session précédente. Sinon les boutons
  // « retour » renverraient vers /quiz/borne alors qu'on est sur son téléphone.
  if (ECRAN === "user" && !SIM_PARAMS.get("espace") && !SIM_PARAMS.get("play")) {
    try { sessionStorage.removeItem("fj_borne"); } catch (e) {}
  }

  injecteHomeBorne();   // bouton maison si on vient de la borne

  // 🎁 Page /quiz/code : on ouvre directement la saisie du code. On NE sort PAS
  // ici : la suite (auto-reconnaissance) doit s'appliquer comme sur /quiz, sinon
  // la même personne serait reconnue sur /quiz mais pas sur /quiz/code — et ne
  // pourrait pas récupérer son code. Sur une BORNE, l'auto-reconnaissance est de
  // toute façon désactivée plus bas (appareil partagé).
  if (ECRAN === "code") { codeAReclamer = null; userView = "reclamer"; }

  // 🌱 Depuis la borne, « Quiz & mon espace jardin » ouvre /quiz?espace=1 : on
  // entre direct dans l'espace (connexion/création → tableau de bord).
  if (SIM_PARAMS.get("espace")) userView = "espace";
  else if (SIM_PARAMS.get("play")) userView = "quiz";

  // 🌱 Auto-reconnaissance : si ce téléphone a déjà une carte de jardinier, on
  // identifie la personne sans qu'elle ait à retaper quoi que ce soit. Sur une
  // borne (appareil partagé : fj_borne posé), on NE reconnaît jamais — chacun
  // repart de zéro pour ne pas hériter du compte du visiteur précédent.
  const moi = estBorne() ? null : chargeMoi();
  if (moi && moi.name && moi.code) {
    const res = await apiLoginJoueur(moi.name, moi.code).catch(() => null);
    if (res && res.exists && !res.mauvais_code) {
      joueur = { name: res.name, code: moi.code, solde: res.solde, recoltees: res.recoltees, nbCodes: res.nbCodes, quizFait: res.quiz_fait !== false };
      // Reconnu : on reste sur l'accueil (userView "auto" → home). Entrer dans
      // « Quiz & mon espace jardin » ira droit au tableau de bord (déjà connecté).
      const m = await reclamerEnAttente();      // un code mis de côté ?
      if (m) jardinMsg = m;
    } else if (res && res.mauvais_code) {
      oublieMoi();   // le code local ne correspond plus (compte modifié) : on oublie
    }
  }

  // 🎁 Lien d'un code bonus scanné en magasin : ?code=FAMI-XXXX
  const cp = SIM_PARAMS.get("code");
  if (cp && !SIMULATION) { codeAReclamer = cp.toUpperCase(); userView = "reclamer"; }
  // 🎁 Page /quiz/code : on ouvre directement l'écran de saisie d'un code.
  else if (ECRAN === "code" && !SIMULATION) { codeAReclamer = null; userView = "reclamer"; }

  render();
})();
