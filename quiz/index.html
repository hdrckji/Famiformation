<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Famiformation — Le grand quiz de lancement</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --pousse: #1E7A46;
  --foret: #0E3B24;
  --brume: #EAF4EC;
  --soleil: #FFC53D;
  --craie: #FFFFFF;
  --corail: #FF6B5E;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  min-height: 100vh;
  background: var(--brume);
  background-image: radial-gradient(circle at 15% 20%, rgba(30,122,70,0.07) 0 140px, transparent 140px),
                    radial-gradient(circle at 85% 80%, rgba(255,197,61,0.12) 0 180px, transparent 180px);
  font-family: 'Nunito Sans', system-ui, sans-serif;
  color: var(--foret);
  display: flex; flex-direction: column; align-items: center;
  padding: 24px 16px 60px;
}
.fami-head { text-align: center; margin-bottom: 18px; }
.fami-logo {
  font-family: 'Fredoka', sans-serif; font-weight: 700;
  font-size: clamp(1.6rem, 4vw, 2.4rem); color: var(--pousse); letter-spacing: 0.5px;
}
.fami-logo span { color: var(--soleil); cursor: default; user-select: none; }
.fami-tag { font-weight: 600; opacity: 0.75; font-size: 0.95rem; }

.fami-nav {
  display: flex; gap: 8px; background: var(--craie);
  padding: 6px; border-radius: 999px; margin-bottom: 28px; flex-wrap: wrap; justify-content: center;
  box-shadow: 0 4px 18px rgba(14,59,36,0.10);
}
.fami-nav button {
  border: none; background: transparent; cursor: pointer;
  font-family: 'Fredoka', sans-serif; font-weight: 600; font-size: 0.95rem;
  color: var(--foret); padding: 10px 18px; border-radius: 999px;
  transition: background .2s, color .2s;
}
.fami-nav button.on { background: var(--pousse); color: var(--craie); }
.fami-nav button:focus-visible { outline: 3px solid var(--soleil); }

.card {
  background: var(--craie); border-radius: 24px;
  box-shadow: 0 8px 30px rgba(14,59,36,0.10);
  padding: 32px 28px; width: 100%; max-width: 680px;
}

/* --- Compte à rebours --- */
.cd-wrap { text-align: center; max-width: 900px; width: 100%; }
.cd-phase {
  display: inline-block; font-family: 'Fredoka', sans-serif; font-weight: 600;
  background: var(--foret); color: var(--soleil);
  padding: 8px 22px; border-radius: 999px; margin-bottom: 26px;
  font-size: clamp(0.95rem, 2.2vw, 1.25rem);
}
.cd-digits { display: flex; justify-content: center; gap: clamp(8px, 2vw, 22px); flex-wrap: wrap; }
.cd-cell {
  background: var(--pousse); color: var(--craie); border-radius: 22px;
  padding: clamp(14px, 3vw, 30px) clamp(10px, 2.5vw, 26px);
  min-width: clamp(78px, 16vw, 160px);
  box-shadow: inset 0 -6px 0 rgba(0,0,0,0.18), 0 10px 24px rgba(14,59,36,0.22);
}
.cd-num {
  font-family: 'Fredoka', sans-serif; font-weight: 700;
  font-size: clamp(2.6rem, 9vw, 6.5rem); line-height: 1;
  font-variant-numeric: tabular-nums;
}
.cd-lab { font-weight: 700; letter-spacing: 2px; font-size: clamp(0.65rem, 1.4vw, 0.9rem); opacity: 0.85; text-transform: uppercase; margin-top: 6px; }
.cd-cell.sec .cd-num { color: var(--soleil); }
.cd-sprout { font-size: clamp(2rem, 5vw, 3.4rem); margin-top: 28px; animation: grow 2.4s ease-in-out infinite; }
@keyframes grow { 0%,100% { transform: translateY(0) scale(1); } 50% { transform: translateY(-8px) scale(1.08); } }
@media (prefers-reduced-motion: reduce) { .cd-sprout { animation: none; } }
.cd-info { margin-top: 24px; font-weight: 600; font-size: clamp(0.95rem, 2vw, 1.2rem); opacity: 0.8; }
.cd-top5 { margin-top: 36px; }
.cd-top5 h3 { font-family: 'Fredoka', sans-serif; margin-bottom: 12px; font-size: 1.15rem; }
.cd-top5-row {
  display: flex; justify-content: space-between; align-items: center;
  background: var(--craie); border-radius: 14px; padding: 10px 18px; margin: 6px auto;
  max-width: 420px; font-weight: 700; box-shadow: 0 3px 12px rgba(14,59,36,0.08);
}

/* --- Quiz --- */
.q-progress { height: 10px; background: var(--brume); border-radius: 999px; overflow: hidden; margin-bottom: 22px; }
.q-progress > div { height: 100%; background: var(--pousse); border-radius: 999px; transition: width .3s; }
.q-num { font-family: 'Fredoka', sans-serif; color: var(--pousse); font-weight: 600; margin-bottom: 8px; }
.q-text { font-family: 'Fredoka', sans-serif; font-weight: 600; font-size: 1.35rem; margin-bottom: 22px; }
.q-opt {
  display: block; width: 100%; text-align: left; cursor: pointer;
  background: var(--brume); border: 3px solid transparent; border-radius: 16px;
  padding: 14px 18px; margin-bottom: 12px;
  font-family: 'Nunito Sans', sans-serif; font-weight: 700; font-size: 1.05rem; color: var(--foret);
  transition: border-color .15s, transform .1s;
}
.q-opt:hover { border-color: var(--pousse); transform: translateX(4px); }
.q-opt:focus-visible { outline: 3px solid var(--soleil); }
.btn {
  display: inline-block; border: none; cursor: pointer;
  background: var(--pousse); color: var(--craie);
  font-family: 'Fredoka', sans-serif; font-weight: 600; font-size: 1.05rem;
  padding: 13px 30px; border-radius: 999px;
  box-shadow: 0 6px 16px rgba(30,122,70,0.35);
  transition: transform .12s;
}
.btn:hover { transform: translateY(-2px); }
.btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }
.btn.ghost { background: transparent; color: var(--pousse); box-shadow: none; border: 2px solid var(--pousse); }
.field {
  width: 100%; padding: 13px 16px; border-radius: 14px;
  border: 2px solid #cfe3d4; font-size: 1.05rem; font-family: 'Nunito Sans', sans-serif;
  font-weight: 600; margin-bottom: 14px; background: #fbfdfb; color: var(--foret);
}
.field:focus { outline: none; border-color: var(--pousse); }
.hint { font-size: 0.88rem; opacity: 0.7; margin-bottom: 16px; line-height: 1.5; }
.alert { background: #FFF3E8; border-radius: 12px; padding: 12px 16px; font-weight: 700; color: #A34A00; margin-bottom: 14px; }
.alert.ok { background: #E7F6EC; color: var(--pousse); }
.score-big {
  font-family: 'Fredoka', sans-serif; font-weight: 700;
  font-size: 4rem; color: var(--pousse); text-align: center; line-height: 1;
}
.center { text-align: center; }

/* --- Classement --- */
.podium { display: flex; align-items: flex-end; justify-content: center; gap: 12px; margin-bottom: 28px; }
.pod {
  background: var(--pousse); color: var(--craie); border-radius: 18px 18px 6px 6px;
  width: clamp(90px, 26vw, 150px); text-align: center; padding: 14px 8px 10px;
  box-shadow: inset 0 -6px 0 rgba(0,0,0,0.18);
}
.pod.p1 { height: 170px; background: var(--foret); }
.pod.p1 .pod-pts { color: var(--soleil); }
.pod.p2 { height: 135px; }
.pod.p3 { height: 110px; background: #4B9B6C; }
.pod-medal { font-size: 1.8rem; }
.pod-name { font-family: 'Fredoka', sans-serif; font-weight: 600; font-size: 0.98rem; word-break: break-word; }
.pod-pts { font-weight: 800; font-size: 1.1rem; }
.rank-row {
  display: grid; grid-template-columns: 46px 1fr auto; align-items: center; gap: 10px;
  background: var(--brume); border-radius: 14px; padding: 11px 16px; margin-bottom: 8px;
  font-weight: 700;
}
.rank-pos { font-family: 'Fredoka', sans-serif; color: var(--pousse); font-weight: 700; }
.rank-pts { font-variant-numeric: tabular-nums; }
.board-wrap { width: 100%; max-width: 680px; }
</style>
</head>
<body>

<header class="fami-head">
  <div class="fami-logo">Famiformation <span>●</span></div>
  <div class="fami-tag">Le grand quiz de lancement</div>
</header>

<main id="app" style="width:100%; display:flex; flex-direction:column; align-items:center;"></main>

<script>
/* ============================================================
   ⚙️ CONFIGURATION — TOUT SE MODIFIE ICI
   ============================================================ */

const CONFIG = {
  dateLancement: new Date("2026-07-29T12:00:00"),
  dateCloture:   new Date("2026-08-30T23:59:59"),
  dateResultats: "31 août",
  pointsParBonneReponse: 10,
  pointsParCodeBonus: 20,
  // 🔐 Les identifiants admin ne sont PLUS ici : ils sont vérifiés par api.php
  // (action=login). Les écrire dans cette page les rendrait lisibles par
  // n'importe qui avec « afficher le code source ».
  api: "api.php",
};

// ❓ LES QUESTIONS NE SONT PLUS ÉCRITES ICI.
// Elles se modifient depuis /quiz/admin et sont servies par api.php. La liste
// ci-dessous n'est qu'un SECOURS : elle ne s'affiche que si le serveur ne répond
// pas, pour qu'un incident réseau ne laisse jamais un joueur devant une page vide.
let QUESTIONS = [
  { q: "En quelle année l'entreprise a-t-elle été fondée ?", options: ["1995", "2001", "2008", "2015"], correct: 1 },
  { q: "Combien de collègues travaillent chez nous aujourd'hui ?", options: ["Moins de 30", "Entre 30 et 60", "Entre 60 et 100", "Plus de 100"], correct: 2 },
  { q: "Quel est le rayon le plus visité du magasin ?", options: ["Rayon A", "Rayon B", "Rayon C", "Rayon D"], correct: 0 },
  { q: "Qui arrive toujours en premier le matin ?", options: ["Prénom 1", "Prénom 2", "Prénom 3", "Prénom 4"], correct: 2 },
  { q: "Quelle est la boisson officielle de la salle de pause ?", options: ["Café noir", "Thé", "Chocolat chaud", "Eau pétillante"], correct: 0 },
  { q: "Question anecdote n°6 — à personnaliser", options: ["Réponse A", "Réponse B", "Réponse C", "Réponse D"], correct: 0 },
  { q: "Question anecdote n°7 — à personnaliser", options: ["Réponse A", "Réponse B", "Réponse C", "Réponse D"], correct: 1 },
  { q: "Question anecdote n°8 — à personnaliser", options: ["Réponse A", "Réponse B", "Réponse C", "Réponse D"], correct: 2 },
  { q: "Question anecdote n°9 — à personnaliser", options: ["Réponse A", "Réponse B", "Réponse C", "Réponse D"], correct: 3 },
  { q: "Question anecdote n°10 — à personnaliser", options: ["Réponse A", "Réponse B", "Réponse C", "Réponse D"], correct: 0 },
  { q: "Question anecdote n°11 — à personnaliser", options: ["Réponse A", "Réponse B", "Réponse C", "Réponse D"], correct: 1 },
  { q: "Question anecdote n°12 — à personnaliser", options: ["Réponse A", "Réponse B", "Réponse C", "Réponse D"], correct: 2 },
  { q: "Question anecdote n°13 — à personnaliser", options: ["Réponse A", "Réponse B", "Réponse C", "Réponse D"], correct: 3 },
  { q: "Question anecdote n°14 — à personnaliser", options: ["Réponse A", "Réponse B", "Réponse C", "Réponse D"], correct: 0 },
  { q: "Question anecdote n°15 — à personnaliser", options: ["Réponse A", "Réponse B", "Réponse C", "Réponse D"], correct: 1 },
  { q: "Question anecdote n°16 — à personnaliser", options: ["Réponse A", "Réponse B", "Réponse C", "Réponse D"], correct: 2 },
  { q: "Question anecdote n°17 — à personnaliser", options: ["Réponse A", "Réponse B", "Réponse C", "Réponse D"], correct: 3 },
  { q: "Question anecdote n°18 — à personnaliser", options: ["Réponse A", "Réponse B", "Réponse C", "Réponse D"], correct: 0 },
  { q: "Question anecdote n°19 — à personnaliser", options: ["Réponse A", "Réponse B", "Réponse C", "Réponse D"], correct: 1 },
  { q: "Question anecdote n°20 — à personnaliser", options: ["Réponse A", "Réponse B", "Réponse C", "Réponse D"], correct: 2 },
];

/* ============================================================
   🌐 API (serveur PHP)
   ============================================================ */

async function apiGetBoard() {
  try {
    const r = await fetch(`${CONFIG.api}?action=board`);
    return r.ok ? await r.json() : [];
  } catch { return []; }
}
async function apiCheckName(name) {
  const r = await fetch(`${CONFIG.api}?action=check`, {
    method: "POST", headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ name }),
  });
  return (await r.json()).exists;
}
async function apiClaimCode(code, name) {
  const r = await fetch(`${CONFIG.api}?action=claim`, {
    method: "POST", headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ code, name }),
  });
  return await r.json();
}
// Récupère les questions saisies dans /quiz/admin. En cas d'échec on garde la
// liste de secours déjà chargée : mieux vaut un quiz de secours qu'un écran vide.
async function apiQuestions() {
  try {
    const r = await fetch(`${CONFIG.api}?action=questions`);
    if (!r.ok) return null;
    const d = await r.json();
    return (Array.isArray(d) && d.length) ? d : null;
  } catch { return null; }
}
async function apiSubmit(entry) {
  const r = await fetch(`${CONFIG.api}?action=submit`, {
    method: "POST", headers: { "Content-Type": "application/json" },
    body: JSON.stringify(entry),
  });
  return r.status !== 409;
}

/* ============================================================
   🧩 OUTILS
   ============================================================ */

const $ = (sel) => document.querySelector(sel);
const app = $("#app");
const pad = (n) => String(n).padStart(2, "0");
const medals = ["🥇", "🥈", "🥉"];
const esc = (s) => String(s).replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function prepareQuestions() {
  return shuffle(QUESTIONS).map((item) => ({
    q: item.q,
    options: shuffle(item.options.map((text, i) => ({ text, good: i === item.correct }))),
  }));
}
function phaseNow() {
  const now = Date.now();
  if (now < CONFIG.dateLancement.getTime()) return "avant";
  if (now <= CONFIG.dateCloture.getTime()) return "ouvert";
  return "termine";
}

/* ============================================================
   🧠 ÉTAT GLOBAL
   ============================================================ */

let board = [];
let userView = "auto";       // auto | board (après avoir joué)
let quiz = null;             // état de la partie en cours
let tickTimer = null;

async function refreshBoard() {
  board = await apiGetBoard();
  // si on affiche le compte à rebours ou le classement, on met à jour le contenu
  const v = currentView();
  if (v === "countdown" || v === "board") render();
}
setInterval(refreshBoard, 30000); // auto-refresh

// Cette page ne montre QUE ce que voit un joueur : le compte à rebours avant
// l'ouverture, le quiz pendant, le classement après avoir joué. La gestion se
// fait sur une page séparée (/quiz/admin), plus de clic secret ici.
function currentView() {
  const phase = phaseNow();
  if (phase === "avant") return "countdown";
  if (phase === "termine") return "countdown";
  if (userView === "board") return "board";
  return "quiz";
}

/* ============================================================
   📺 VUE — COMPTE À REBOURS
   ============================================================ */

function renderCountdown() {
  const phase = phaseNow();
  const target = phase === "avant" ? CONFIG.dateLancement : CONFIG.dateCloture;
  const phaseLabel = phase === "avant" ? "🚀 Lancement dans..."
    : phase === "ouvert" ? "⏳ Fin du quiz dans..."
    : `🏆 Résultats le ${CONFIG.dateResultats} !`;
  const info = phase === "avant"
    ? "Quelque chose se prépare... rendez-vous le 29 juillet à midi !"
    : phase === "ouvert"
      ? "Le quiz est ouvert ! Joue depuis ton téléphone et grimpe au classement."
      : "Le quiz est terminé. Merci à tous les participants ! 🎉";

  const top5 = board.slice(0, 5);
  const top5Html = (phase !== "avant" && top5.length)
    ? `<div class="cd-top5"><h3>🌟 Top 5 du moment</h3>${top5.map((p, i) =>
        `<div class="cd-top5-row"><span>${medals[i] || (i + 1) + "."} ${esc(p.name)}</span><span>${p.score} pts</span></div>`
      ).join("")}</div>`
    : "";

  app.innerHTML = `
    <div class="cd-wrap">
      <div class="cd-phase">${phaseLabel}</div>
      ${phase !== "termine" ? `
      <div class="cd-digits" id="cd-digits">
        <div class="cd-cell"><div class="cd-num" id="cd-j">--</div><div class="cd-lab">Jours</div></div>
        <div class="cd-cell"><div class="cd-num" id="cd-h">--</div><div class="cd-lab">Heures</div></div>
        <div class="cd-cell"><div class="cd-num" id="cd-m">--</div><div class="cd-lab">Minutes</div></div>
        <div class="cd-cell sec"><div class="cd-num" id="cd-s">--</div><div class="cd-lab">Secondes</div></div>
      </div>` : ""}
      <div class="cd-sprout">🌱</div>
      <div class="cd-info">${info}</div>
      ${top5Html}
    </div>`;

  clearInterval(tickTimer);
  if (phase !== "termine") {
    const tick = () => {
      const diff = Math.max(0, target.getTime() - Date.now());
      if (diff === 0) { render(); return; } // bascule de phase
      $("#cd-j").textContent = pad(Math.floor(diff / 86400000));
      $("#cd-h").textContent = pad(Math.floor((diff % 86400000) / 3600000));
      $("#cd-m").textContent = pad(Math.floor((diff % 3600000) / 60000));
      $("#cd-s").textContent = pad(Math.floor((diff % 60000) / 1000));
    };
    tick();
    tickTimer = setInterval(tick, 1000);
  }
}

/* ============================================================
   ❓ VUE — QUIZ
   ============================================================ */

function renderQuiz() {
  clearInterval(tickTimer);
  // Hors période d'ouverture, on repasse au compte à rebours.
  if (phaseNow() !== "ouvert") { render(); return; }

  if (!quiz) quiz = { step: "intro", name: "", error: "", questions: prepareQuestions(), idx: 0, correct: 0, codes: [], codeMsg: null, start: 0, score: 0 };

  if (quiz.step === "intro") {
    app.innerHTML = `<div class="card">
      <h2 class="q-text">Prêt·e à jouer ? 🎤</h2>
      <p class="hint">${quiz.questions.length} questions sur l'entreprise et les collègues · une seule participation par personne ·
      ton prénom et ton score seront visibles dans le classement commun.</p>
      ${quiz.error ? `<div class="alert">${esc(quiz.error)}</div>` : ""}
      <input class="field" id="q-name" placeholder="Ton prénom (ex : Marie D.)" maxlength="24" value="${esc(quiz.name)}">
      <button class="btn" id="q-start">C'est parti ! 🚀</button>
    </div>`;
    $("#q-name").addEventListener("keydown", (e) => e.key === "Enter" && $("#q-start").click());
    $("#q-start").addEventListener("click", async () => {
      const name = $("#q-name").value.trim();
      quiz.name = name;
      if (name.length < 2) { quiz.error = "Entre ton prénom (et une initiale si besoin) 🙂"; renderQuiz(); return; }
      $("#q-start").disabled = true;
      const exists = await apiCheckName(name).catch(() => false);
      if (exists) {
        quiz.error = "Ce prénom a déjà participé ! Une seule tentative par personne. Si c'est un homonyme, ajoute une initiale (ex : Marie D.).";
        renderQuiz(); return;
      }
      quiz.error = ""; quiz.start = Date.now(); quiz.step = "play";
      renderQuiz();
    });
    return;
  }

  if (quiz.step === "play") {
    const q = quiz.questions[quiz.idx];
    app.innerHTML = `<div class="card">
      <div class="q-progress"><div style="width:${(quiz.idx / quiz.questions.length) * 100}%"></div></div>
      <div class="q-num">Question ${quiz.idx + 1} / ${quiz.questions.length}</div>
      <div class="q-text">${esc(q.q)}</div>
      ${q.options.map((o, i) => `<button class="q-opt" data-i="${i}">${esc(o.text)}</button>`).join("")}
    </div>`;
    app.querySelectorAll(".q-opt").forEach((btn) => btn.addEventListener("click", () => {
      if (q.options[btn.dataset.i].good) quiz.correct++;
      if (quiz.idx + 1 < quiz.questions.length) { quiz.idx++; renderQuiz(); }
      else { quiz.step = "bonus"; renderQuiz(); }
    }));
    return;
  }

  if (quiz.step === "bonus") {
    app.innerHTML = `<div class="card">
      <h2 class="q-text">🎁 Un code bonus ?</h2>
      <p class="hint">Tu as trouvé un QR code en magasin ? Entre le code ici pour gagner +${CONFIG.pointsParCodeBonus} points.
      Chaque code n'est valable qu'une seule fois : premier arrivé, premier servi !</p>
      ${quiz.codeMsg ? `<div class="alert ${quiz.codeMsg.ok ? "ok" : ""}">${esc(quiz.codeMsg.text)}</div>` : ""}
      ${quiz.codes.length ? `<div class="alert ok">Codes validés : ${quiz.codes.map(esc).join(", ")} ✅</div>` : ""}
      <input class="field" id="q-code" placeholder="Ex : FAMI-XXXX">
      <div style="display:flex; gap:10px; flex-wrap:wrap;">
        <button class="btn ghost" id="q-claim">Valider ce code</button>
        <button class="btn" id="q-finish">Voir mon score 🏁</button>
      </div>
    </div>`;
    $("#q-code").addEventListener("keydown", (e) => e.key === "Enter" && $("#q-claim").click());
    $("#q-claim").addEventListener("click", async () => {
      const code = $("#q-code").value.trim().toUpperCase();
      if (!code) return;
      if (quiz.codes.includes(code)) { quiz.codeMsg = { ok: false, text: "Tu as déjà utilisé ce code." }; renderQuiz(); return; }
      const res = await apiClaimCode(code, quiz.name).catch(() => ({ ok: false, reason: "erreur" }));
      if (res.ok) { quiz.codes.push(code); quiz.codeMsg = { ok: true, text: `Code validé ! +${CONFIG.pointsParCodeBonus} points 🎁` }; }
      else if (res.reason === "deja_pris") quiz.codeMsg = { ok: false, text: "Trop tard ! Ce code a déjà été utilisé par quelqu'un d'autre. 🏃" };
      else quiz.codeMsg = { ok: false, text: "Code inconnu... vérifie l'orthographe !" };
      renderQuiz();
    });
    $("#q-finish").addEventListener("click", async () => {
      $("#q-finish").disabled = true;
      $("#q-finish").textContent = "Enregistrement...";
      const time = Math.round((Date.now() - quiz.start) / 1000);
      quiz.score = quiz.correct * CONFIG.pointsParBonneReponse + quiz.codes.length * CONFIG.pointsParCodeBonus;
      await apiSubmit({ name: quiz.name, score: quiz.score, correct: quiz.correct, codes: quiz.codes.length, time }).catch(() => {});
      board = await apiGetBoard();
      quiz.step = "done";
      renderQuiz();
    });
    return;
  }

  // done
  app.innerHTML = `<div class="card center">
    <h2 class="q-text">Bravo ${esc(quiz.name)} ! 🎉</h2>
    <div class="score-big">${quiz.score} pts</div>
    <p class="hint" style="margin-top:14px;">
      ${quiz.correct} bonne${quiz.correct > 1 ? "s" : ""} réponse${quiz.correct > 1 ? "s" : ""} sur ${quiz.questions.length}
      ${quiz.codes.length ? ` · ${quiz.codes.length} code${quiz.codes.length > 1 ? "s" : ""} bonus` : ""}
      <br>Résultats officiels et remise des prix le ${CONFIG.dateResultats} — bonne chance ! 🍀</p>
    <button class="btn" id="q-board">Voir le classement 🏆</button>
  </div>`;
  $("#q-board").addEventListener("click", () => {
    userView = "board";
    quiz = null;
    render();
  });
}

/* ============================================================
   🏆 VUE — CLASSEMENT
   ============================================================ */

function renderBoard() {
  clearInterval(tickTimer);
  if (!board.length) {
    app.innerHTML = `<div class="card center">
      <h2 class="q-text">Le classement est encore vide 🌱</h2>
      <p class="hint">Sois le premier ou la première à jouer !</p></div>`;
    return;
  }
  const top3 = board.slice(0, 3);
  const rest = board.slice(3);
  const order = [1, 0, 2];
  app.innerHTML = `<div class="board-wrap"><div class="card">
    <div class="podium">
      ${order.map((pos) => top3[pos] ? `
        <div class="pod p${pos + 1}">
          <div class="pod-medal">${medals[pos]}</div>
          <div class="pod-name">${esc(top3[pos].name)}</div>
          <div class="pod-pts">${top3[pos].score} pts</div>
        </div>` : "").join("")}
    </div>
    ${rest.map((p, i) => `
      <div class="rank-row">
        <span class="rank-pos">${i + 4}.</span>
        <span>${esc(p.name)}</span>
        <span class="rank-pts">${p.score} pts</span>
      </div>`).join("")}
    <div class="center" style="margin-top:18px;">
      <button class="btn ghost" id="b-refresh">Actualiser 🔄</button>
    </div>
  </div></div>`;
  $("#b-refresh").addEventListener("click", async () => { board = await apiGetBoard(); renderBoard(); });
}

/* ============================================================
   🌳 ROUTEUR
   ============================================================ */

function render() {
  const v = currentView();
  if (v === "countdown") renderCountdown();
  else if (v === "quiz") renderQuiz();
  else renderBoard();
}

(async () => {
  // Les questions viennent du serveur (saisies dans /quiz/admin). Si l'appel
  // échoue, QUESTIONS garde la liste de secours définie plus haut.
  const [dist, bd] = await Promise.all([apiQuestions(), apiGetBoard()]);
  if (dist) { QUESTIONS = dist; }
  board = bd;
  render();
})();
</script>
</body>
