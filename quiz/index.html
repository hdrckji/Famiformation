<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="color-scheme" content="light">
<meta name="supported-color-schemes" content="light">
<title>Famiformation — Le grand quiz de lancement</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  /* 🌗 Le site est conçu EN CLAIR. Sans ça, les navigateurs à « mode sombre
     forcé » (Samsung Internet, Firefox, Chrome auto-dark) réinventent les
     couleurs et cassent la mise en page et les dessins (la fée notamment). */
  color-scheme: light;
  --pousse: #1E7A46;
  --foret: #0E3B24;
  --brume: #EAF4EC;
  --soleil: #FFC53D;
  --craie: #FFFFFF;
  --corail: #FF6B5E;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  min-height: 100vh;
  background: var(--brume);
  background-image: radial-gradient(circle at 15% 20%, rgba(30,122,70,0.07) 0 140px, transparent 140px),
                    radial-gradient(circle at 85% 80%, rgba(255,197,61,0.12) 0 180px, transparent 180px);
  font-family: 'Nunito Sans', system-ui, sans-serif;
  color: var(--foret);
  display: flex; flex-direction: column; align-items: center;
  padding: 24px 16px 60px;
}
.fami-head { text-align: center; margin-bottom: 18px; }
.fami-logo {
  font-family: 'Fredoka', sans-serif; font-weight: 700;
  font-size: clamp(1.6rem, 4vw, 2.4rem); color: var(--pousse); letter-spacing: 0.5px;
}
.fami-logo span { color: var(--soleil); cursor: default; user-select: none; }
.fami-tag { font-weight: 600; opacity: 0.75; font-size: 0.95rem; }

.fami-nav {
  display: flex; gap: 8px; background: var(--craie);
  padding: 6px; border-radius: 999px; margin-bottom: 28px; flex-wrap: wrap; justify-content: center;
  box-shadow: 0 4px 18px rgba(14,59,36,0.10);
}
.fami-nav button {
  border: none; background: transparent; cursor: pointer;
  font-family: 'Fredoka', sans-serif; font-weight: 600; font-size: 0.95rem;
  color: var(--foret); padding: 10px 18px; border-radius: 999px;
  transition: background .2s, color .2s;
}
.fami-nav button.on { background: var(--pousse); color: var(--craie); }
.fami-nav button:focus-visible { outline: 3px solid var(--soleil); }

.card {
  background: var(--craie); border-radius: 24px;
  box-shadow: 0 8px 30px rgba(14,59,36,0.10);
  padding: 32px 28px; width: 100%; max-width: 680px;
}

/* --- Compte à rebours --- */
.cd-wrap { text-align: center; max-width: 900px; width: 100%; }
.cd-phase {
  display: inline-block; font-family: 'Fredoka', sans-serif; font-weight: 600;
  background: var(--foret); color: var(--soleil);
  padding: 8px 22px; border-radius: 999px; margin-bottom: 26px;
  font-size: clamp(0.95rem, 2.2vw, 1.25rem);
}
.cd-digits { display: flex; justify-content: center; gap: clamp(8px, 2vw, 22px); flex-wrap: wrap; }
.cd-cell {
  background: var(--pousse); color: var(--craie); border-radius: 22px;
  padding: clamp(14px, 3vw, 30px) clamp(10px, 2.5vw, 26px);
  min-width: clamp(78px, 16vw, 160px);
  box-shadow: inset 0 -6px 0 rgba(0,0,0,0.18), 0 10px 24px rgba(14,59,36,0.22);
}
.cd-num {
  font-family: 'Fredoka', sans-serif; font-weight: 700;
  font-size: clamp(2.6rem, 9vw, 6.5rem); line-height: 1;
  font-variant-numeric: tabular-nums;
}
.cd-lab { font-weight: 700; letter-spacing: 2px; font-size: clamp(0.65rem, 1.4vw, 0.9rem); opacity: 0.85; text-transform: uppercase; margin-top: 6px; }
.cd-cell.sec .cd-num { color: var(--soleil); }
.cd-sprout { font-size: clamp(2rem, 5vw, 3.4rem); margin-top: 28px; animation: grow 2.4s ease-in-out infinite; }
@keyframes grow { 0%,100% { transform: translateY(0) scale(1); } 50% { transform: translateY(-8px) scale(1.08); } }
@media (prefers-reduced-motion: reduce) { .cd-sprout { animation: none; } }
.cd-info { margin-top: 24px; font-weight: 600; font-size: clamp(0.95rem, 2vw, 1.2rem); opacity: 0.8; }
.cd-top5 { margin-top: 36px; }
.cd-top5 h3 { font-family: 'Fredoka', sans-serif; margin-bottom: 12px; font-size: 1.15rem; }
.cd-top5-row {
  display: flex; justify-content: space-between; align-items: center;
  background: var(--craie); border-radius: 14px; padding: 10px 18px; margin: 6px auto;
  max-width: 420px; font-weight: 700; box-shadow: 0 3px 12px rgba(14,59,36,0.08);
}

/* --- Quiz --- */
.q-progress { height: 10px; background: var(--brume); border-radius: 999px; overflow: hidden; margin-bottom: 22px; }
.q-progress > div { height: 100%; background: var(--pousse); border-radius: 999px; transition: width .3s; }
.q-num { font-family: 'Fredoka', sans-serif; color: var(--pousse); font-weight: 600; margin-bottom: 8px; }
.q-text { font-family: 'Fredoka', sans-serif; font-weight: 600; font-size: 1.35rem; margin-bottom: 22px; }
.q-opt {
  display: block; width: 100%; text-align: left; cursor: pointer;
  background: var(--brume); border: 3px solid transparent; border-radius: 16px;
  padding: 14px 18px; margin-bottom: 12px;
  font-family: 'Nunito Sans', sans-serif; font-weight: 700; font-size: 1.05rem; color: var(--foret);
  transition: border-color .15s, transform .1s;
}
.q-opt:hover { border-color: var(--pousse); transform: translateX(4px); }
.q-opt:focus-visible { outline: 3px solid var(--soleil); }
.btn {
  display: inline-block; border: none; cursor: pointer;
  background: var(--pousse); color: var(--craie);
  font-family: 'Fredoka', sans-serif; font-weight: 600; font-size: 1.05rem;
  padding: 13px 30px; border-radius: 999px;
  box-shadow: 0 6px 16px rgba(30,122,70,0.35);
  transition: transform .12s;
}
.btn:hover { transform: translateY(-2px); }
.btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }
.btn.ghost { background: transparent; color: var(--pousse); box-shadow: none; border: 2px solid var(--pousse); }
.field {
  width: 100%; padding: 13px 16px; border-radius: 14px;
  border: 2px solid #cfe3d4; font-size: 1.05rem; font-family: 'Nunito Sans', sans-serif;
  font-weight: 600; margin-bottom: 14px; background: #fbfdfb; color: var(--foret);
}
.field:focus { outline: none; border-color: var(--pousse); }
.hint { font-size: 0.88rem; opacity: 0.7; margin-bottom: 16px; line-height: 1.5; }
.alert { background: #FFF3E8; border-radius: 12px; padding: 12px 16px; font-weight: 700; color: #A34A00; margin-bottom: 14px; }
.alert.ok { background: #E7F6EC; color: var(--pousse); }
.alert.warn { background: #FFF3E8; color: #A34A00; }
.lbl { display: block; font-weight: 700; font-size: .85rem; color: var(--foret); opacity: .82; margin: 2px 0 5px; }
.plus { margin: 2px 0 14px; }
.plus summary { cursor: pointer; font-weight: 700; color: var(--pousse); font-size: .92rem; }
.lien { color: var(--pousse); font-weight: 700; text-decoration: none; }
.lien:hover { text-decoration: underline; }
.lien.conf { font-size: .82rem; opacity: .75; }
.mini-warn { font-size: .78rem; color: #A34A00; margin: 2px 0 14px; line-height: 1.4; }
.modal-fond { position: fixed; inset: 0; z-index: 100003; background: rgba(14,59,36,.5);
  display: flex; align-items: center; justify-content: center; padding: 18px; }
.modal { background: var(--craie); border-radius: 18px; padding: 22px; max-width: 460px; width: 100%;
  max-height: 84vh; overflow-y: auto; box-shadow: 0 14px 40px rgba(0,0,0,.3); }
.modal h3 { font-family: 'Fredoka', sans-serif; color: var(--pousse); margin-bottom: 10px; }
.modal p { font-size: .9rem; line-height: 1.5; margin-bottom: 10px; }
.modal .btn { width: 100%; margin-top: 6px; }

/* Grosse fenêtre « Félicitations, code trouvé » (écran /quiz/code). */
.code-modal { max-width: 560px; text-align: center; padding: 30px 26px; }
.code-modal .cm-emoji { font-size: clamp(3rem, 9vw, 4rem); line-height: 1; }
.code-modal .cm-titre { font-family: 'Fredoka', sans-serif; color: var(--pousse); font-size: clamp(1.6rem, 5vw, 2.2rem); margin: 6px 0 8px; }
.code-modal .cm-sous { font-size: 1.05rem; line-height: 1.5; margin-bottom: 16px; }
.code-modal .cm-consigne { font-weight: 800; color: var(--foret); font-size: clamp(1.05rem, 3vw, 1.25rem); margin-bottom: 18px; }
.cm-modules { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 14px; }
.cm-mod { display: flex; flex-direction: column; align-items: center; gap: 8px; cursor: pointer;
  background: var(--brume); border: 3px solid transparent; border-radius: 18px; padding: clamp(22px, 4vh, 34px) 16px;
  transition: transform .12s, border-color .15s, box-shadow .15s; }
.cm-mod:hover, .cm-mod:active { transform: translateY(-3px); border-color: var(--pousse); box-shadow: 0 8px 24px rgba(14,59,36,.14); }
.cm-mod-emo { font-size: clamp(2.2rem, 6vw, 3rem); line-height: 1; }
.cm-mod-titre { font-family: 'Fredoka', sans-serif; font-weight: 700; font-size: clamp(1.1rem, 3vw, 1.35rem); color: var(--foret); }
.score-big {
  font-family: 'Fredoka', sans-serif; font-weight: 700;
  font-size: 4rem; color: var(--pousse); text-align: center; line-height: 1;
}
.center { text-align: center; }

/* --- Classement --- */
.podium { display: flex; align-items: flex-end; justify-content: center; gap: 12px; margin-bottom: 28px; }
.pod {
  background: var(--pousse); color: var(--craie); border-radius: 18px 18px 6px 6px;
  width: clamp(90px, 26vw, 150px); text-align: center; padding: 14px 8px 10px;
  box-shadow: inset 0 -6px 0 rgba(0,0,0,0.18);
}
.pod.p1 { height: 170px; background: var(--foret); }
.pod.p1 .pod-pts { color: var(--soleil); }
.pod.p2 { height: 135px; }
.pod.p3 { height: 110px; background: #4B9B6C; }
.pod-medal { font-size: 1.8rem; }
.pod-name { font-family: 'Fredoka', sans-serif; font-weight: 600; font-size: 0.98rem; word-break: break-word; }
.pod-pts { font-weight: 800; font-size: 1.1rem; }
.rank-row {
  display: grid; grid-template-columns: 46px 1fr auto; align-items: center; gap: 10px;
  background: var(--brume); border-radius: 14px; padding: 11px 16px; margin-bottom: 8px;
  font-weight: 700;
}
.rank-pos { font-family: 'Fredoka', sans-serif; color: var(--pousse); font-weight: 700; }
.rank-pts { font-variant-numeric: tabular-nums; }
.board-wrap { width: 100%; max-width: 680px; }
/* Titre du classement + « c'est toi » mis en avant */
.board-titre { font-family: 'Fredoka', sans-serif; font-weight: 700; color: var(--pousse);
  font-size: clamp(1.3rem, 3.4vw, 1.9rem); text-align: center; margin-bottom: 16px; }
.board-titre span { display: block; font-size: .62em; font-weight: 600; color: var(--foret); opacity: .8; }
.moi-score { display: flex; align-items: center; gap: 14px; margin-bottom: 20px; padding: 14px 18px;
  border-radius: 18px; background: linear-gradient(100deg, #0E3B24, #1E6238); color: #fff;
  box-shadow: 0 8px 24px rgba(11,51,32,.22); }
.moi-rang { font-family: 'Fredoka', sans-serif; font-weight: 700; font-size: clamp(1.6rem, 5vw, 2.4rem);
  min-width: 1.6em; text-align: center; }
.moi-info { flex: 1; text-align: left; min-width: 0; }
.moi-nom { font-family: 'Fredoka', sans-serif; font-weight: 700; font-size: clamp(1.05rem, 2.6vw, 1.4rem); }
.moi-pts { font-weight: 600; opacity: .92; font-size: clamp(.85rem, 2vw, 1.05rem); }
.moi-score .btn { background: var(--soleil); color: #0B3320; flex: 0 0 auto; }
.rank-row.moi { background: #DDF0DE; box-shadow: 0 0 0 2px var(--pousse) inset; }
.pod.moi { box-shadow: 0 0 0 3px var(--soleil); border-radius: 14px; }

/* --- La plante qui pousse pendant le quiz --- */
.q-plante {
  display: flex; align-items: center; justify-content: space-between; gap: 12px;
  background: var(--brume); border-radius: 16px; padding: 10px 16px; margin-bottom: 18px;
}
.q-plante .stade { display: flex; align-items: center; gap: 10px; font-weight: 800; }
.q-plante .stade .emo { font-size: 1.9rem; line-height: 1; }
.q-plante .stade .nom { font-family: 'Fredoka', sans-serif; font-size: .92rem; color: var(--pousse); }
.q-plante .graines { font-weight: 800; font-variant-numeric: tabular-nums; white-space: nowrap; }
.q-plante .gain {
  color: var(--pousse); font-weight: 800; margin-left: 6px; display: inline-block;
  animation: gain-pop .9s ease-out both;
}
.q-plante .serie { margin-left: 8px; color: #E4572E; font-weight: 800; font-size: .92em; white-space: nowrap; }
/* Chrono de la question (encourage la rapidité) */
.q-chrono { float: right; font-variant-numeric: tabular-nums; color: var(--pousse); font-weight: 800; }
@keyframes gain-pop {
  0% { opacity: 0; transform: translateY(8px) scale(.7); }
  30% { opacity: 1; transform: translateY(0) scale(1.15); }
  100% { opacity: 0; transform: translateY(-10px) scale(1); }
}
.pousse-pop { display: inline-block; animation: pousse-pop .5s ease-out; }
@keyframes pousse-pop { 0% { transform: scale(.6); } 60% { transform: scale(1.25); } 100% { transform: scale(1); } }
@media (prefers-reduced-motion: reduce) { .q-plante .gain, .pousse-pop { animation: none; } }

/* --- Avatars (initiales) --- */
.avatar {
  width: 34px; height: 34px; border-radius: 50%; flex-shrink: 0;
  display: inline-flex; align-items: center; justify-content: center;
  font-family: 'Fredoka', sans-serif; font-weight: 700; font-size: .85rem; color: var(--craie);
}
.rank-row { grid-template-columns: 46px auto 1fr auto; }
.rank-nom { display: flex; align-items: center; gap: 8px; min-width: 0; }
.rank-nom .qui { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.rank-stade { font-size: 1.25rem; }

/* --- Pastilles de navigation (après avoir joué) --- */
.pills { display: flex; gap: 8px; background: var(--craie); padding: 6px; border-radius: 999px;
         margin-bottom: 20px; box-shadow: 0 4px 18px rgba(14,59,36,.10); }
.pills button { border: none; background: transparent; cursor: pointer; font-family: 'Fredoka', sans-serif;
                font-weight: 600; font-size: .95rem; color: var(--foret); padding: 9px 18px; border-radius: 999px; }
.pills button.on { background: var(--pousse); color: var(--craie); }

/* --- Le jardin collectif --- */
.jardin-solde {
  display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap;
  margin-bottom: 16px;
}
.jardin-solde .montant { font-family: 'Fredoka', sans-serif; font-weight: 700; font-size: 1.3rem; color: var(--pousse); }
.catalogue { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 18px; }
.plt {
  border: 3px solid transparent; cursor: pointer; background: var(--brume);
  border-radius: 14px; padding: 8px 12px; text-align: center;
  font-family: 'Nunito Sans', sans-serif; font-weight: 700; color: var(--foret);
}
.plt .emo { font-size: 1.5rem; display: block; }
.plt .cout { font-size: .78rem; opacity: .75; }
.plt.choisi { border-color: var(--pousse); background: #DFF0E4; }
.plt:disabled { opacity: .4; cursor: not-allowed; }
.grille {
  display: grid; grid-template-columns: repeat(8, 1fr); gap: 6px;
  background: #D9C7A7; border-radius: 18px; padding: 10px;
}
.case {
  aspect-ratio: 1; border: none; border-radius: 10px; cursor: pointer;
  background: #CDB894; font-size: clamp(1.1rem, 4.5vw, 1.8rem);
  display: flex; align-items: center; justify-content: center;
}
.case.vide:hover { background: #BFA87F; }
.case.pleine { background: #A7C79B; cursor: help; }
.case.neuve { animation: pousse-pop .5s ease-out; }
.jardin-info { margin-top: 12px; font-weight: 700; font-size: .92rem; min-height: 1.4em; }

/* --- Plantes RARES : de vraies fleurs entièrement métalliques (or/argent/bronze)
   posées sur un fond sombre discret pour que le métal ressorte, avec un halo
   coloré et un reflet qui balaie. --- */
.case.pleine[class*="rare-"] { background: radial-gradient(circle at 50% 42%, #3C5646, #23342B); position: relative; overflow: hidden; }
.case.pleine.rare-or     { box-shadow: 0 0 14px rgba(233,178,30,.85), inset 0 0 8px rgba(255,225,120,.4); }
.case.pleine.rare-argent { box-shadow: 0 0 14px rgba(190,200,215,.85), inset 0 0 8px rgba(255,255,255,.4); }
.case.pleine.rare-bronze { box-shadow: 0 0 14px rgba(184,115,51,.85), inset 0 0 8px rgba(240,190,130,.35); }
.plt[class*="rare-"] { position: relative; overflow: hidden; }
.plt.rare-or     { box-shadow: 0 0 10px rgba(233,178,30,.6); }
.plt.rare-argent { box-shadow: 0 0 10px rgba(190,200,215,.6); }
.plt.rare-bronze { box-shadow: 0 0 10px rgba(184,115,51,.6); }

/* La fleur métallique : elle occupe la case, brille (halo pulsé) et son reflet
   spéculaire scintille doucement. */
.case .fleur-rare { width: 84%; height: 84%; }
.plt .emo .fleur-rare { display: inline-block; width: 34px; height: 34px; }
.case .arbre-glace { width: 96%; height: 96%; }
.plt .emo .arbre-glace { display: inline-block; width: 38px; height: 38px; vertical-align: middle; }
/* 🎟️ Ticket glace bleu — en gros dans le module, en petit dans les messages. */
.ticket-glace { display: inline-block; }
svg.ticket-glace.tk-inline { width: 1.7em; height: auto; vertical-align: -0.3em; }
span.tk-inline { display: inline-block; width: 1.3em; height: 1.3em; vertical-align: -0.3em; }
span.tk-inline svg { width: 100%; height: auto; display: block; }
.bm-ticket { line-height: 0; }
.bm-ticket .ticket-glace { width: clamp(96px, 24vw, 148px); height: auto;
  filter: drop-shadow(0 5px 12px rgba(21,44,107,.3)); }
.fleur-rare { display: block; filter: drop-shadow(0 1px 2px rgba(0,0,0,.35)); animation: fleurBrille 2.6s ease-in-out infinite; }
@keyframes fleurBrille {
  0%, 100% { filter: drop-shadow(0 1px 2px rgba(0,0,0,.35)) drop-shadow(0 0 1px rgba(255,255,255,.4)); }
  50%      { filter: drop-shadow(0 1px 2px rgba(0,0,0,.35)) drop-shadow(0 0 6px rgba(255,255,255,.95)); }
}
.fleur-rare .glint { animation: glintBouge 2.6s ease-in-out infinite; transform-origin: 50px 50px; }
@keyframes glintBouge { 0%,100% { opacity: .55; transform: translate(0,0); } 50% { opacity: 1; transform: translate(4px, -3px); } }

/* Le reflet qui balaie la case rare. */
.case.pleine[class*="rare-"]::after {
  content: ""; position: absolute; top: 0; left: -60%; width: 45%; height: 100%; z-index: 2;
  background: linear-gradient(100deg, transparent, rgba(255,255,255,.55), transparent);
  transform: skewX(-18deg); animation: brille 3s ease-in-out infinite; pointer-events: none;
}
@keyframes brille { 0%, 55% { left: -60%; } 100% { left: 130%; } }

/* Les étincelles projetées quand on plante une plante rare. */
.scintille { position: fixed; z-index: 100002; pointer-events: none; font-size: 1.1rem;
  transform: translate(-50%, -50%); animation: scintilleVole 1s ease-out forwards; }
@keyframes scintilleVole {
  0% { opacity: 0; transform: translate(-50%, -50%) scale(.4); }
  20% { opacity: 1; }
  100% { opacity: 0; transform: translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))) scale(1.2) rotate(60deg); }
}

/* --- Classement des plus beaux jardins --- */
.beaux { margin-top: 16px; border-top: 1px solid #e3eee6; padding-top: 10px; }
.beaux summary { cursor: pointer; font-family: 'Fredoka', sans-serif; font-weight: 700; color: var(--pousse); font-size: 1.05rem; }
.beau-row { display: flex; justify-content: space-between; gap: 10px; background: var(--brume); border-radius: 12px;
  padding: 9px 15px; margin-bottom: 7px; font-weight: 700; }
.beau-row.moi { background: #DFF0E4; outline: 2px solid var(--pousse); }
.btn.small { font-size: .9rem; padding: 8px 16px; }
.btn.mini { font-size: .82rem; padding: 6px 12px; }

/* --- Revente d'une plante (dans la barre d'info du jardin) --- */
.revente { display: inline-flex; align-items: center; gap: 8px; flex-wrap: wrap; }

/* --- Mini-jeu : la chasse aux mauvaises herbes --- */
.herbe-top { display: flex; justify-content: space-between; align-items: center; gap: 10px; flex-wrap: wrap;
  margin-bottom: 12px; font-family: 'Fredoka', sans-serif; font-weight: 600; }
.herbe-top .chrono, .herbe-top .butin { font-variant-numeric: tabular-nums; }
.herbe-top .butin { color: var(--pousse); }
.herbe-zone { position: relative; width: 100%; height: min(54vh, 440px);
  background: linear-gradient(#E4F2DE, #CFE8C7); border-radius: 18px; overflow: hidden;
  border: 3px solid #BBD9AE; touch-action: manipulation; user-select: none; }
.herbe { position: absolute; transform: translate(-50%,-50%) scale(0); border: none; cursor: pointer;
  width: 58px; height: 58px; border-radius: 50%; padding: 0; display: flex; align-items: center;
  justify-content: center; font-size: 1.85rem; line-height: 1; box-shadow: 0 3px 8px rgba(14,59,36,.25);
  animation: herbePop 1.15s ease forwards; }
@keyframes herbePop {
  0%   { transform: translate(-50%,-50%) scale(0); }
  12%  { transform: translate(-50%,-50%) scale(1.08); }
  22%,78% { transform: translate(-50%,-50%) scale(1); opacity: 1; }
  100% { transform: translate(-50%,-50%) scale(.5); opacity: 0; }
}
.herbe .val { position: absolute; bottom: -7px; right: -7px; font-size: .68rem; font-weight: 900;
  background: var(--foret); color: #fff; border-radius: 999px; padding: 1px 6px; box-shadow: 0 1px 3px rgba(0,0,0,.3); }
.herbe.h-normale { background: radial-gradient(circle at 35% 30%, #C4E79E, #7FB55E); }
.herbe.h-bronze  { background: radial-gradient(circle at 35% 30%, #EBC095, #B87333); }
.herbe.h-argent  { background: radial-gradient(circle at 35% 30%, #F4F5F8, #A7AEB9); }
.herbe.h-or      { background: radial-gradient(circle at 35% 30%, #FFE9A0, #E9B21E); box-shadow: 0 0 16px rgba(233,178,30,.75); }
.herbe.crunch { animation: herbeCrunch .28s ease forwards; }
@keyframes herbeCrunch { to { transform: translate(-50%,-50%) scale(1.7); opacity: 0; } }
.herbe-gain { position: absolute; transform: translate(-50%,-50%); font-weight: 900; color: var(--pousse);
  pointer-events: none; animation: herbeGain .7s ease forwards; text-shadow: 0 1px 2px #fff; }
@keyframes herbeGain { 0% { opacity: 0; } 20% { opacity: 1; } 100% { transform: translate(-50%,-160%); opacity: 0; } }
.herbe-overlay { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center;
  justify-content: center; text-align: center; gap: 12px; padding: 18px; background: rgba(255,255,255,.82); }

/* ============================================================
   🎬 SIMULATION — barre, menu, écran télé (kiosque)
   ============================================================ */
.sim-bar { background: #0E3B24; color: var(--soleil); font-weight: 700; font-size: .85rem;
  padding: 7px 14px; border-radius: 999px; margin-bottom: 14px; text-align: center;
  display: flex; gap: 10px; align-items: center; justify-content: center; flex-wrap: wrap; }
.sim-bar button { background: var(--soleil); color: #0E3B24; border: none; border-radius: 999px;
  font-weight: 800; padding: 4px 12px; cursor: pointer; font-size: .82rem; }
.sim-menu { display: flex; flex-direction: column; gap: 12px; margin-top: 16px; }
.sim-menu .btn { text-align: center; padding: 16px; line-height: 1.45; }
.sim-menu .btn small { font-weight: 600; opacity: .85; font-size: .8rem; }

.tv { text-align: center; width: 100%; max-width: 1100px; margin: 0 auto; padding: 10px; }
.tv-phase { font-family: 'Fredoka', sans-serif; font-weight: 600; background: var(--foret); color: var(--soleil);
  display: inline-block; padding: 10px 26px; border-radius: 999px; font-size: clamp(1rem, 2.4vw, 1.6rem); margin-bottom: 24px; }
.tv-chrono { font-family: 'Fredoka', sans-serif; font-weight: 700; color: var(--pousse);
  font-size: clamp(5rem, 26vw, 17rem); line-height: 1; font-variant-numeric: tabular-nums;
  animation: tvPulse 1s ease-in-out infinite; }
@keyframes tvPulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.08); } }
.tv-sub { font-weight: 700; font-size: clamp(1rem, 2.4vw, 1.5rem); opacity: .8; margin-top: 12px; }
.tv-tree { font-size: clamp(2rem, 5.5vw, 3.6rem); line-height: 1; margin-top: 14px;
  animation: grow 2.4s ease-in-out infinite; }

/* --- La BORNE : plein écran, 3 grandes tuiles tactiles sur toute la largeur --- */
body.mode-borne { justify-content: center; padding: 20px 2vw; }
body.mode-borne #app { width: 100%; }
.borne { width: 100%; margin: 0 auto; text-align: center; padding: 0 2vw; }
.borne-titre { font-family: 'Fredoka', sans-serif; color: var(--pousse); font-size: clamp(1.8rem, 4.5vw, 3rem); }
.borne-sous { font-weight: 700; opacity: .72; margin-bottom: 30px; font-size: clamp(1.1rem, 2.6vw, 1.45rem); }
.borne-modules { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }

/* --- Accueil /quiz (téléphone/ordi) = même chose que la borne, MAIS avec le
   compte à rebours en haut. À zéro il disparaît et « Participer » s'active. --- */
.home { width: 100%; margin: 0 auto; text-align: center; padding: 0 clamp(12px, 3vw, 48px); }
/* Teaser + liens secondaires (Comment ça marche / J'ai déjà un compte) */
.home-tease { margin: 22px auto 10px; font-weight: 600; opacity: .78; max-width: 640px;
  font-size: clamp(.95rem, 2.2vw, 1.15rem); }
.home-liens { display: flex; flex-wrap: wrap; gap: 10px 20px; align-items: center; justify-content: center; }
.lien-explik { border: none; background: none; cursor: pointer; font-family: 'Fredoka', sans-serif;
  font-weight: 700; color: var(--pousse); font-size: clamp(.95rem, 2.2vw, 1.15rem); padding: 6px 4px;
  text-decoration: underline; text-underline-offset: 3px; }
.lien-explik:hover { color: var(--foret); }
/* Bloc d'accueil de /quiz/code : explique l'événement à qui débarque via un QR */
.code-intro { background: #E7F4E4; border: 2px solid var(--pousse); border-radius: 18px;
  padding: 14px 16px; margin-bottom: 14px; text-align: left; font-weight: 500; line-height: 1.5; font-size: .95rem; }
.code-intro > b:first-child { display: block; font-family: 'Fredoka', sans-serif; color: var(--pousse);
  font-size: 1.1rem; margin-bottom: 6px; }
.code-intro span { display: block; margin-top: 8px; padding-top: 8px; border-top: 1px dashed rgba(11,51,32,.2); }
/* Badge « il reste N codes à trouver » sur /quiz/code */
.rc-restants { font-family: 'Fredoka', sans-serif; font-weight: 700; color: var(--pousse);
  background: var(--brume); border-radius: 999px; padding: 8px 16px; display: inline-block;
  margin: 2px auto 14px; font-size: clamp(.9rem, 2.2vw, 1.1rem); }
.rc-restants:empty { display: none; }
/* Indice « où chercher les codes » (affiché à J-1) */
.zones-hint { margin: 16px auto 4px; max-width: 420px; text-align: left; background: #FFF6E6;
  border: 1px solid #F2C94C; border-radius: 16px; padding: 14px 16px; }
.zh-titre { font-family: 'Fredoka', sans-serif; font-weight: 700; color: #0B3320; margin-bottom: 8px; }
.zh-row { display: flex; justify-content: space-between; gap: 12px; font-weight: 600; padding: 4px 0;
  border-top: 1px dashed rgba(11,51,32,.15); }
.zh-row:first-of-type { border-top: none; }
/* Indices encore verrouillés : visibles mais pas accessibles (clic = message). */
.zones-hint.zones-lock { display: block; width: 100%; cursor: pointer; font: inherit; color: inherit;
  background: var(--brume); border: 1px dashed rgba(11,51,32,.32); opacity: .85; }
.zones-hint.zones-lock:hover { opacity: 1; background: #E6F0E6; }
.zh-lock { font-weight: 600; opacity: .72; font-size: .88rem; margin-top: 2px; }
/* Explication du jardin + zone du mini-jeu */
.jardin-explik { background: var(--brume); border-radius: 16px; padding: 14px 16px; margin-bottom: 14px;
  text-align: left; font-weight: 500; line-height: 1.5; font-size: .95rem; }
.jardin-explik b { color: var(--foret); }
.jardin-explik > b:first-child { display: block; font-family: 'Fredoka', sans-serif; margin-bottom: 6px; font-size: 1.05rem; }
.je-rassure { display: block; margin-top: 8px; padding-top: 8px; border-top: 1px dashed rgba(11,51,32,.18); }
.j-herbes-zone { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; justify-content: center;
  background: #E7F4E4; border: 2px solid var(--pousse); border-radius: 16px; padding: 12px 16px; margin-bottom: 16px; }
.j-herbes-zone span { font-weight: 600; font-size: .88rem; opacity: .85; text-align: left; flex: 1 1 200px; }
/* Bloc principal (mis en avant) sur l'accueil / l'espace */
.bm-primaire { border-color: var(--pousse); background: #F1F8EF; }
/* Espace (gate connexion/création) : 2 blocs centrés */
.esp-modules { grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); max-width: 760px; margin: 0 auto; }
/* Tableau de bord */
.dash-hello { font-family: 'Fredoka', sans-serif; font-weight: 700; color: var(--foret);
  font-size: clamp(1.1rem, 2.8vw, 1.6rem); margin-bottom: 18px; }
.dash-hello span { display: block; font-weight: 600; color: var(--pousse); font-size: .8em; }
.dash-modules { margin: 0 auto; }
/* Case de consentement RGPD à la création de compte */
.rgpd { display: flex; gap: 10px; align-items: flex-start; text-align: left; font-size: .9rem;
  font-weight: 500; margin: 16px 0; line-height: 1.4; opacity: .92; }
.rgpd input { margin-top: 3px; flex: 0 0 auto; width: 18px; height: 18px; cursor: pointer; }
/* Modal « Comment ça marche ? » */
.modal.explik { max-width: 560px; text-align: left; position: relative; max-height: 86vh; overflow-y: auto; }
.explik-x { position: absolute; top: 12px; right: 14px; border: none; background: none; cursor: pointer;
  font-size: 1.3rem; color: var(--foret); opacity: .6; }
.explik-x:hover { opacity: 1; }
.explik-titre { font-family: 'Fredoka', sans-serif; color: var(--pousse); font-size: clamp(1.5rem, 4vw, 2rem);
  text-align: center; margin: 4px 0 2px; }
.explik-sous { text-align: center; opacity: .72; font-weight: 600; margin-bottom: 18px; }
.explik-steps { display: flex; flex-direction: column; gap: 12px; margin-bottom: 18px; }
.explik-step { display: flex; gap: 14px; align-items: flex-start; background: var(--brume);
  border-radius: 16px; padding: 14px 16px; }
.explik-step.explik-star { background: #E7F4E4; box-shadow: 0 0 0 2px var(--pousse) inset; }
.explik-ico { font-size: 1.9rem; line-height: 1; flex: 0 0 auto; }
.explik-txt { display: block; font-weight: 500; font-size: .97rem; line-height: 1.55; }
.explik-txt b { font-weight: 700; color: var(--foret); }
.explik-txt b.eh { display: block; font-family: 'Fredoka', sans-serif; font-size: 1.06rem;
  margin-bottom: 4px; line-height: 1.3; }
/* Petite liste à puces des bonus (plus lisible qu'une suite de retours à la ligne) */
.explik-liste { display: flex; flex-direction: column; gap: 5px; margin: 8px 0 6px; padding-left: 2px; }
.explik-liste > span { display: block; padding: 6px 10px; background: rgba(255,255,255,.65);
  border-radius: 10px; line-height: 1.45; }
.home-cd { display: flex; flex-direction: column; align-items: center; gap: 8px; margin: 0 auto 26px;
  background: linear-gradient(100deg, #0B3320, #1E6238); color: #fff; border-radius: 22px;
  padding: 16px clamp(18px, 4vw, 30px); max-width: 640px; box-shadow: 0 8px 26px rgba(11,51,32,.22); }
.hcd-lab { font-family: 'Fredoka', sans-serif; font-weight: 700; font-size: clamp(.95rem, 2.4vw, 1.25rem); opacity: .95; }
.hcd-digits { display: flex; gap: clamp(10px, 3vw, 24px); }
.hcd-cell { display: flex; flex-direction: column; align-items: center; min-width: 46px; }
.hcd-cell b { font-family: 'Fredoka', sans-serif; font-weight: 700; font-size: clamp(1.5rem, 5vw, 2.6rem); line-height: 1; }
.hcd-cell span { font-size: .72rem; text-transform: uppercase; letter-spacing: 1px; opacity: .82; margin-top: 2px; }
.borne-mod.mod-inactif { opacity: .55; filter: grayscale(.35); }
.borne-mod.mod-inactif:hover, .borne-mod.mod-inactif:active { transform: none; border-color: transparent;
  box-shadow: 0 6px 24px rgba(14,59,36,.1); }

/* 🖥️ SUR LA BORNE : on enlève le plafond de largeur (le téléphone/ordi le garde
   pour rester lisible) → l'accueil prend TOUTE la largeur de l'écran, avec 3
   grosses tuiles côte à côte qui remplissent la hauteur. */
/* MÊME mise en page pour /quiz (ordi/téléphone) ET /quiz/borne : grandes tuiles
   côte à côte sur écran large, empilées sur téléphone. La SEULE différence entre
   les deux est le compte à rebours (présent sur /quiz, absent sur la borne). */
.home .borne-titre { font-size: clamp(2rem, 5vw, 4.4rem); }
.home .borne-sous { font-size: clamp(1.1rem, 2.8vw, 1.9rem); margin-bottom: clamp(22px, 4vh, 46px); }
.home .borne-modules { gap: clamp(16px, 2.4vw, 34px); }
.home .borne-mod { min-height: clamp(220px, 46vh, 640px); padding: clamp(26px, 5vh, 66px) clamp(18px, 2vw, 34px); }
.home .bm-emo { font-size: clamp(3rem, 9vw, 6rem); }
.home .bm-titre { font-size: clamp(1.35rem, 3vw, 2.6rem); }
.home .bm-desc { font-size: clamp(.95rem, 1.8vw, 1.5rem); }
.home .bm-ticket .ticket-glace { width: clamp(110px, 15vw, 230px); }
/* Téléphone / écran étroit : on empile en tuiles plus courtes. */
@media (max-width: 720px) {
  .home .borne-modules { grid-template-columns: 1fr; }
  .home .borne-mod { min-height: clamp(150px, 22vh, 260px); }
  .home .bm-emo { font-size: clamp(2.6rem, 12vw, 3.8rem); }
}

/* Bouton « maison » permanent quand on est arrivé par la borne. */
.home-borne { position: fixed; top: 12px; right: 12px; z-index: 100050; width: 48px; height: 48px;
  border-radius: 50%; background: var(--craie); box-shadow: 0 3px 12px rgba(14,59,36,.22);
  display: flex; align-items: center; justify-content: center; font-size: 1.5rem; text-decoration: none;
  cursor: pointer; transition: transform .12s; }
.home-borne:hover { transform: scale(1.07); }

/* Site externe (page mail) affiché dans la borne, avec une barre de retour. */
.ext-overlay { position: fixed; inset: 0; z-index: 100060; background: var(--brume); display: flex; flex-direction: column; }
.ext-bar { display: flex; align-items: center; gap: 14px; padding: 12px clamp(14px, 3vw, 26px);
  background: linear-gradient(100deg, #0B3320 0%, #16512F 55%, #1E6238 100%);
  box-shadow: 0 4px 18px rgba(11,51,32,.28); position: relative; z-index: 2; }
.ext-brand { font-family: 'Fredoka', sans-serif; font-weight: 700; color: #fff; letter-spacing: .3px;
  font-size: clamp(1rem, 2.4vw, 1.35rem); text-shadow: 0 1px 2px rgba(0,0,0,.18); white-space: nowrap; }
.ext-nav { margin-left: auto; display: flex; gap: 10px; }
.ext-btn { display: inline-flex; align-items: center; gap: 8px; border: none; cursor: pointer;
  border-radius: 999px; font-family: 'Fredoka', sans-serif; font-weight: 700; white-space: nowrap;
  font-size: clamp(.9rem, 2vw, 1.12rem); padding: 11px clamp(16px, 2.4vw, 22px); color: #fff;
  background: rgba(255,255,255,.14); box-shadow: 0 1px 0 rgba(255,255,255,.12) inset;
  transition: transform .12s ease, background .18s ease, box-shadow .18s ease; }
.ext-btn span { font-size: 1.15em; line-height: 1; }
.ext-btn:hover { transform: translateY(-1px); background: rgba(255,255,255,.24); }
.ext-btn:active { transform: translateY(0); }
.ext-btn.actif { background: #fff; color: var(--pousse); box-shadow: 0 4px 12px rgba(0,0,0,.16); }
.ext-btn.ext-cta { background: var(--soleil); color: #0B3320; box-shadow: 0 4px 12px rgba(247,193,58,.35); }
.ext-btn.ext-cta:hover { background: var(--soleil); filter: brightness(1.05); }
.ext-btn.ext-cta.actif { background: var(--soleil); color: #0B3320; }
.ext-frame { flex: 1; width: 100%; border: 0; background: #fff; }
.borne-mod { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; cursor: pointer;
  background: var(--craie); border: 3px solid transparent; border-radius: 24px; padding: clamp(30px, 6vh, 60px) 24px;
  min-height: clamp(200px, 34vh, 340px); box-shadow: 0 6px 24px rgba(14,59,36,.1);
  transition: transform .12s, border-color .15s, box-shadow .15s; }
.borne-mod:hover, .borne-mod:active { transform: translateY(-3px); border-color: var(--pousse); box-shadow: 0 10px 30px rgba(14,59,36,.16); }
.bm-emo { font-size: clamp(2.8rem, 8vw, 4.4rem); line-height: 1; }
.bm-titre { font-family: 'Fredoka', sans-serif; font-weight: 700; font-size: clamp(1.3rem, 3.4vw, 1.9rem); color: var(--foret); }
.bm-desc { font-weight: 600; opacity: .7; font-size: clamp(.9rem, 2.2vw, 1.15rem); }
/* Sur la télé, on colle le bloc (compte à rebours / classement) EN HAUT pour
   laisser tout le bas libre à la fée (sinon elle chevauche le texte). */
body.mode-tele { justify-content: flex-start; padding-top: 20px; }
body.mode-tele .fami-head { margin-bottom: 6px; }
body.mode-tele #app { flex: 0 0 auto; }
.tv-cols { display: flex; gap: 30px; align-items: center; justify-content: center; flex-wrap: wrap; }
.tv-board { flex: 1 1 320px; max-width: 520px; text-align: left; }
.tv-row { display: flex; justify-content: space-between; gap: 12px; background: var(--craie); border-radius: 14px;
  padding: 12px 20px; margin-bottom: 10px; font-family: 'Fredoka', sans-serif; font-weight: 600;
  font-size: clamp(1rem, 2.2vw, 1.5rem); box-shadow: 0 3px 12px rgba(14,59,36,.1); }
.tv-qr { flex: 0 0 auto; text-align: center; width: min(280px, 62vw); margin-top: clamp(40px, 11vh, 150px); }
.tv-qr-box { background: #fff; padding: 14px; border-radius: 18px; box-shadow: 0 8px 24px rgba(14,59,36,.18);
  width: 100%; }
.tv-qr-box svg { width: 100%; height: auto; display: block; }
.tv-scan { font-family: 'Fredoka', sans-serif; font-weight: 700; color: var(--pousse);
  font-size: clamp(1.1rem, 2.6vw, 1.6rem); margin-top: 14px; }
.tv-url { font-size: clamp(.8rem, 1.7vw, 1.05rem); font-weight: 600; opacity: .72; margin-top: 4px; }

/* 📺 Télé — derniers 10 s : uniquement un chiffre géant qui « pulse ». */
.tf-wrap { display: flex; flex-direction: column; align-items: center; justify-content: center;
  min-height: 78vh; text-align: center; }
.tf-num { font-family: 'Fredoka', sans-serif; font-weight: 700; color: var(--pousse);
  font-size: clamp(9rem, 40vh, 30rem); line-height: 1; text-shadow: 0 10px 40px rgba(14,59,36,.18); }
.tf-num.pop { animation: tfPop .5s ease; }
@keyframes tfPop { 0% { transform: scale(1.35); opacity: .3; } 60% { transform: scale(1); opacity: 1; } }
/* 📺 Télé — l'instant du lancement : gros mot de fête. */
.tl-wrap { gap: 10px; }
.tl-emoji { font-size: clamp(4rem, 16vh, 10rem); line-height: 1; animation: tlBounce 1.4s ease-in-out infinite; }
.tl-titre { font-family: 'Fredoka', sans-serif; font-weight: 700; color: var(--pousse);
  font-size: clamp(3rem, 12vh, 8rem); line-height: 1.05; }
.tl-sous { font-family: 'Fredoka', sans-serif; font-weight: 600; color: var(--foret);
  font-size: clamp(1.3rem, 4vh, 2.6rem); opacity: .9; }
@keyframes tlBounce { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-14px); } }

/* 🎉 Confettis (lancement) — pluie de morceaux colorés, purement décoratif. */
/* 📣 GRANDE ANNONCE de la fée sur la télé (codes restants / récompenses).
   Fond vert profond, la fée entre par la gauche, le message en très grand, et le
   compte à rebours qui continue en petit tout en haut. Durée : 10 s. */
.anim-tele { position: fixed; inset: 0; z-index: 100040; display: flex; align-items: center;
  justify-content: center; opacity: 0; transition: opacity .55s ease;
  background: linear-gradient(145deg, #12502C 0%, #1E7A46 52%, #12502C 100%); }
.anim-tele.on { opacity: 1; }
.anim-cd { position: absolute; top: 2.6vh; left: 0; right: 0; text-align: center; color: rgba(255,255,255,.88);
  font-family: 'Fredoka', sans-serif; font-weight: 700; letter-spacing: .5px;
  font-size: clamp(.9rem, 1.9vw, 1.5rem); font-variant-numeric: tabular-nums; }
.anim-scene { display: flex; align-items: center; justify-content: center;
  gap: clamp(16px, 4vw, 64px); padding: 0 5vw; max-width: 1700px; }
.anim-fee { flex: 0 0 auto; width: clamp(110px, 19vw, 290px);
  animation: animFeeEntre 1.1s cubic-bezier(.22,1,.32,1) both; }
.anim-fee svg { width: 100%; height: auto; display: block; }
.anim-bloc { text-align: left; animation: animTexte .9s .3s ease both; }
.anim-titre { font-family: 'Fredoka', sans-serif; font-weight: 700; color: #fff; line-height: 1.08;
  font-size: clamp(1.9rem, 5.6vw, 4.8rem); text-shadow: 0 5px 22px rgba(0,0,0,.28); }
.anim-detail { margin-top: 1.6vh; color: #DCF2E1; font-weight: 600; line-height: 1.4;
  font-size: clamp(.95rem, 2.3vw, 1.9rem); }
@keyframes animFeeEntre { from { opacity: 0; transform: translateX(-16vw) scale(.85); } to { opacity: 1; transform: none; } }
@keyframes animTexte { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: none; } }
@media (prefers-reduced-motion: reduce) { .anim-fee, .anim-bloc { animation: none; } }

/* Les confettis passent DERRIÈRE les fenêtres (z-index < .modal-fond) : la fête
   est visible tout autour, mais le texte de la modale reste parfaitement lisible. */
.confetti-layer { position: fixed; inset: 0; z-index: 100002; pointer-events: none; overflow: hidden; }
.confetti { position: absolute; top: -8vh; width: 12px; height: 16px; opacity: .95;
  will-change: transform; animation: confettiFall linear forwards; }
@keyframes confettiFall { to { transform: translate(var(--drift, 0), 116vh) rotate(var(--rot, 540deg)); } }

/* 📺 Télé — écran des 3 VAINQUEURS (fin d'événement) : podium en marches. */
.tw { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 82vh; text-align: center; }
.tw-titre { font-family: 'Fredoka', sans-serif; font-weight: 700; color: var(--pousse);
  font-size: clamp(2rem, 6vw, 4.6rem); margin-bottom: clamp(18px, 4vh, 46px); }
.tw-podium { display: flex; align-items: flex-end; justify-content: center; gap: clamp(10px, 2.5vw, 38px); }
.tw-place { display: flex; flex-direction: column; align-items: center; gap: 4px; }
.tw-medal { font-size: clamp(2.4rem, 7vw, 5rem); line-height: 1; }

<header class="fami-head">
  <div class="fami-logo">Famiformation <span>●</span></div>
  <div class="fami-tag">Le grand quiz de lancement</div>
</header>

<main id="app" style="width:100%; display:flex; flex-direction:column; align-items:center;"></main>

<script>
/* ============================================================
   ⚙️ CONFIGURATION — TOUT SE MODIFIE ICI
   ============================================================ */

const CONFIG = {
  dateLancement: new Date("2026-07-29T12:30:00"),
  dateCloture:   new Date("2026-08-30T23:59:59"),
  dateResultats: "31 août à 12h30",
  pointsParBonneReponse: 10,
  pointsParCodeBonus: 10,   // graines par code bonus (doit = $CODE_GRAINES d'api.php)
  maxCodes: 2,              // codes bonus cumulables par personne (= $MAX_CODES)
  // 🔐 Les identifiants admin ne sont PLUS ici : ils sont vérifiés par api.php
  // (action=login). Les écrire dans cette page les rendrait lisibles par
  // n'importe qui avec « afficher le code source ».
  api: "api.php",
};

// 🎯 BARÈME DU QUIZ. Chaque bonne réponse rapporte :
//   • une base fixe (validité),
//   • un bonus RAPIDITÉ continu (au ratio du temps de réponse : plus tu réponds
//     vite, plus tu gagnes — 3,2 s ≠ 3,8 s, les décimales départagent),
//   • un bonus de SÉRIE qui grimpe avec les bonnes réponses d'affilée.
// Le score final est un nombre à virgule (les décimales servent à départager).
const BAREME = {
  base: CONFIG.pointsParBonneReponse,  // graines par bonne réponse (validité)
  vitesseMax: 5,                       // bonus max si réponse quasi instantanée
  vitesseT: 12,                        // au-delà de 12 s : plus de bonus rapidité
  serieMax: 5,                         // plafond du bonus de série
};
// Gain d'une bonne réponse selon le temps (s) et la série en cours.
function gainReponse(tSec, serie) {
  const vitesse = BAREME.vitesseMax * Math.max(0, 1 - tSec / BAREME.vitesseT);
  const bonusSerie = serie >= 2 ? Math.min(serie - 1, BAREME.serieMax) : 0;
  return BAREME.base + vitesse + bonusSerie;
}
const arr1 = (n) => Math.round((Number(n) || 0) * 10) / 10;   // arrondi 1 décimale (interne)
// 👁️ AFFICHAGE des graines : toujours un nombre ENTIER. Les décimales existent
// bien en coulisses (elles départagent deux joueurs au classement), mais on ne
// les montre jamais : 140,1 et 140,2 s'affichent tous les deux « 140 ».
const affG = (n) => Math.round(Number(n) || 0);
// 🧪 Compte de test : le pseudo « Testeur » sert à essayer le jeu EN VRAI (borne,
// téléphone, ordi) sans déranger personne — il n'apparaît pas au classement et
// rien ne lui est verrouillé (quiz rejouable, jardin toujours ouvert).
const COMPTES_TEST = ["testeur"];
function estCompteTest() { return !!joueur && COMPTES_TEST.includes((joueur.name || "").toLowerCase()); }
const toutOuvert = () => SIMULATION || estCompteTest();

/* ============================================================
   🎬 MODE SIMULATION — un banc d'essai avec plusieurs ÉCRANS à prévisualiser.
   RIEN n'est envoyé au serveur : tout reste en mémoire (rechargement = remise à
   zéro). Le code bonus de test « FAMI-TEST » est toujours accepté.

   ?simulation           → menu de choix des écrans
   ?simulation=tele      → écran TÉLÉ en boucle (fin du chrono → score + QR + lien)
   ?simulation=joueur    → la vraie vue joueur, du début à la fin
   ?simulation=code      → la récupération d'un code bonus
   ============================================================ */
const SIM_PARAMS = new URLSearchParams(location.search);
const SIMULATION = SIM_PARAMS.has("simulation");
let simMode = SIMULATION ? (SIM_PARAMS.get("simulation") || "menu") : "";

// 🕐 APERÇU DATÉ (onglet Simulation de l'admin) : ?simulation=apercu. C'est un
// mode simulation (rien n'est envoyé au serveur), MAIS la phase suit une horloge
// choisie au lieu d'être forcée « ouvert ». Avec &simnow=<date>, on décale
// l'horloge pour voir l'affichage à une date/heure précise (elle avance ensuite
// en temps réel : les secondes défilent depuis ce moment).
const APERCU = SIMULATION && SIM_PARAMS.get("simulation") === "apercu";
// 🎨 Aperçu « mon jardin » pour l'admin : ?simulation=jardin. On entre direct dans
// le jardin d'un joueur de démo, les plantes sont GRATUITES (mais leurs prix sont
// affichés, pour l'immersion). Rien n'est envoyé au serveur.
const JARDIN_LIBRE = SIMULATION && SIM_PARAMS.get("simulation") === "jardin";
if (APERCU && SIM_PARAMS.has("simnow")) {
  const cible = new Date(SIM_PARAMS.get("simnow")).getTime();
  if (!isNaN(cible)) {
    const reel = Date.now.bind(Date);
    const ecart = cible - reel();
    Date.now = () => reel() + ecart;
  }
}

/* ============================================================
   🖥️ ÉCRAN — selon l'URL, la MÊME page se comporte différemment :
   • /quiz/tele  → affichage TÉLÉ (chrono + classement en boucle, avec QR)
   • /quiz/borne → borne (à configurer plus tard)
   • /quiz/code  → récupération d'un code bonus
   • /quiz       → la vue des joueurs
   (Pour tester en local sans réécriture d'URL : ?ecran=tele / borne / code)
   ============================================================ */
const _ecranParam = SIM_PARAMS.get("ecran") || "";
const _path = location.pathname;
const ECRAN =
  (/\/tele\/?$/.test(_path)  || _ecranParam === "tele")  ? "tele"  :
  (/\/borne\/?$/.test(_path) || _ecranParam === "borne") ? "borne" :
  (/\/code\/?$/.test(_path)  || _ecranParam === "code")  ? "code"  : "user";
// Adresse du quiz des joueurs (pour le QR / les redirections), sans /tele /borne /code.
function quizBase() {
  let p = location.pathname.replace(/\/(tele|borne|code)\/?$/, "/").replace(/[^/]*$/, "");
  return location.origin + p;
}
let simPret = { board: false, jardin: false };   // 1er chargement réel, ensuite local
let simTimers = [];
function stopSim() { simTimers.forEach((t) => { clearTimeout(t); clearInterval(t); }); simTimers = []; }

// Petite barre en haut, en simulation : rappelle l'écran courant et permet de
// revenir au menu des écrans.
function majBarreSim() {
  if (!SIMULATION) return;
  let bar = document.getElementById("simBar");
  if (!bar) {
    bar = document.createElement("div");
    bar.id = "simBar";
    bar.className = "sim-bar";
    const head = document.querySelector(".fami-head");
    if (head) head.after(bar); else return;
  }
  const noms = { menu: "menu", tele: "écran télé", joueur: "vue joueur", code: "code bonus" };
  bar.innerHTML = `🎬 Simulation · ${noms[simMode] || ""}`
    + (simMode !== "menu" ? ` <button id="simRetour">◂ Écrans</button>` : "");
  const r = document.getElementById("simRetour");
  if (r) r.onclick = () => { simMode = "menu"; userView = "auto"; quiz = null; joueur = null; stopSim(); render(); };
}

// ❓ LES QUESTIONS NE SONT PLUS ÉCRITES ICI.
// Elles se modifient depuis /quiz/admin et sont servies par api.php. La liste
// ci-dessous n'est qu'un SECOURS : elle ne s'affiche que si le serveur ne répond
// pas, pour qu'un incident réseau ne laisse jamais un joueur devant une page vide.
let QUESTIONS = [
  { q: "En quelle année l'entreprise a-t-elle été fondée ?", options: ["1995", "2001", "2008", "2015"], correct: 1 },
  { q: "Combien de collègues travaillent chez nous aujourd'hui ?", options: ["Moins de 30", "Entre 30 et 60", "Entre 60 et 100", "Plus de 100"], correct: 2 },
  { q: "Quel est le rayon le plus visité du magasin ?", options: ["Rayon A", "Rayon B", "Rayon C", "Rayon D"], correct: 0 },
  { q: "Qui arrive toujours en premier le matin ?", options: ["Prénom 1", "Prénom 2", "Prénom 3", "Prénom 4"], correct: 2 },
  { q: "Quelle est la boisson officielle de la salle de pause ?", options: ["Café noir", "Thé", "Chocolat chaud", "Eau pétillante"], correct: 0 },
  { q: "Question anecdote n°6 — à personnaliser", options: ["Réponse A", "Réponse B", "Réponse C", "Réponse D"], correct: 0 },
  { q: "Question anecdote n°7 — à personnaliser", options: ["Réponse A", "Réponse B", "Réponse C", "Réponse D"], correct: 1 },
  { q: "Question anecdote n°8 — à personnaliser", options: ["Réponse A", "Réponse B", "Réponse C", "Réponse D"], correct: 2 },
  { q: "Question anecdote n°9 — à personnaliser", options: ["Réponse A", "Réponse B", "Réponse C", "Réponse D"], correct: 3 },
  { q: "Question anecdote n°10 — à personnaliser", options: ["Réponse A", "Réponse B", "Réponse C", "Réponse D"], correct: 0 },
  { q: "Question anecdote n°11 — à personnaliser", options: ["Réponse A", "Réponse B", "Réponse C", "Réponse D"], correct: 1 },
  { q: "Question anecdote n°12 — à personnaliser", options: ["Réponse A", "Réponse B", "Réponse C", "Réponse D"], correct: 2 },
  { q: "Question anecdote n°13 — à personnaliser", options: ["Réponse A", "Réponse B", "Réponse C", "Réponse D"], correct: 3 },
  { q: "Question anecdote n°14 — à personnaliser", options: ["Réponse A", "Réponse B", "Réponse C", "Réponse D"], correct: 0 },
  { q: "Question anecdote n°15 — à personnaliser", options: ["Réponse A", "Réponse B", "Réponse C", "Réponse D"], correct: 1 },
  { q: "Question anecdote n°16 — à personnaliser", options: ["Réponse A", "Réponse B", "Réponse C", "Réponse D"], correct: 2 },
  { q: "Question anecdote n°17 — à personnaliser", options: ["Réponse A", "Réponse B", "Réponse C", "Réponse D"], correct: 3 },
  { q: "Question anecdote n°18 — à personnaliser", options: ["Réponse A", "Réponse B", "Réponse C", "Réponse D"], correct: 0 },
  { q: "Question anecdote n°19 — à personnaliser", options: ["Réponse A", "Réponse B", "Réponse C", "Réponse D"], correct: 1 },
  { q: "Question anecdote n°20 — à personnaliser", options: ["Réponse A", "Réponse B", "Réponse C", "Réponse D"], correct: 2 },
];

/* ============================================================
   🌐 API (serveur PHP)
   ============================================================ */

async function apiGetBoard() {
  // En simulation : on lit le vrai classement UNE fois (pour un décor réaliste),
  // puis on garde la version en mémoire — sinon le rafraîchissement automatique
  // effacerait les participations simulées.
  if (SIMULATION && simPret.board) return board;
  try {
    const r = await fetch(`${CONFIG.api}?action=board`);
    const b = r.ok ? await r.json() : [];
    if (SIMULATION) simPret.board = true;
    return b;
  } catch { return []; }
}
async function apiCheckName(name) {
  if (SIMULATION) return board.some((p) => p.name.toLowerCase() === name.toLowerCase());
  const r = await fetch(`${CONFIG.api}?action=check`, {
    method: "POST", headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ name }),
  });
  return (await r.json()).exists;
}
async function apiClaimCode(code, name) {
  if (SIMULATION) {
    return code === "FAMI-TEST" ? { ok: true } : { ok: false, reason: "inconnu" };
  }
  const r = await fetch(`${CONFIG.api}?action=claim`, {
    method: "POST", headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ code, name }),
  });
  return await r.json();
}
// ⏱ Les dates de l'événement (réglées dans l'admin). En cas d'échec, on garde
// les dates par défaut inscrites dans CONFIG.
async function apiConfig() {
  try {
    const r = await fetch(`${CONFIG.api}?action=config_get`);
    return r.ok ? await r.json() : null;
  } catch { return null; }
}
// Récupère les questions saisies dans /quiz/admin. En cas d'échec on garde la
// liste de secours déjà chargée : mieux vaut un quiz de secours qu'un écran vide.
async function apiQuestions() {
  try {
    const r = await fetch(`${CONFIG.api}?action=questions`);
    if (!r.ok) return null;
    const d = await r.json();
    return (Array.isArray(d) && d.length) ? d : null;
  } catch { return null; }
}
async function apiSubmit(entry) {
  if (SIMULATION) {
    // Même logique que le serveur : si le compte existe (créé avant de jouer), on
    // met à jour sa récolte au lieu d'ajouter un doublon. Jamais sur le serveur.
    const p = board.find((x) => x.name.toLowerCase() === (entry.name || "").toLowerCase());
    if (p) {
      if ((p.code || "") !== (entry.code || "")) return false;   // nom pris par un autre
      if (!p.quiz_fait) { p.score = entry.score; p.correct = entry.correct; p.time = entry.time; p.quiz_fait = true; if (entry.nom) p.nom = entry.nom; }
    } else {
      board.push({ name: entry.name, code: entry.code || "", nom: entry.nom || "", score: entry.score,
                   bonus: 0, depensees: 0, correct: entry.correct, codes: 0, codes_pris: [],
                   time: entry.time, quiz_fait: true, date: new Date().toISOString() });
    }
    board.sort((a, b) => b.score - a.score || a.time - b.time);
    return true;
  }
  const r = await fetch(`${CONFIG.api}?action=submit`, {
    method: "POST", headers: { "Content-Type": "application/json" },
    body: JSON.stringify(entry),
  });
  return r.status !== 409;
}
// 🌱 Récupérer son compte (autre téléphone) : pseudo + code à 4 chiffres.
async function apiLoginJoueur(name, code) {
  if (SIMULATION) {
    // On accepte le PSEUDO ou le NOM comme identifiant (comme le serveur).
    const id = name.toLowerCase();
    const complet = (x) => [x.prenom, x.nom].filter(Boolean).join(" ").trim().toLowerCase();

// 🎁 Récupérer un code bonus (auth pseudo + code à 4 chiffres).
async function apiCodeClaim(name, code, bonuscode) {
  if (SIMULATION) {
    window.__simCodes = window.__simCodes || new Set();
    const bc = String(bonuscode).toUpperCase();
    if (!/^FAMI-/i.test(bc)) return { ok: false, reason: "inconnu" };
    const p = board.find((x) => x.name.toLowerCase() === name.toLowerCase());
    if (!p || (p.code || "") !== code) return { ok: false, reason: "auth" };
    p.codes_pris = p.codes_pris || [];
    if (p.codes_pris.includes(bc)) return { ok: false, reason: "deja_a_toi" };
    if (p.codes_pris.length >= CONFIG.maxCodes) return { ok: false, reason: "max_atteint" };
    if (window.__simCodes.has(bc)) return { ok: false, reason: "deja_pris" };
    window.__simCodes.add(bc); p.codes_pris.push(bc); p.codes = p.codes_pris.length; p.score += CONFIG.pointsParCodeBonus;
    return { ok: true, gagne: CONFIG.pointsParCodeBonus, recoltees: p.score, solde: p.score + (p.bonus || 0) - (p.depensees || 0), nbCodes: p.codes };
  }
  const r = await fetch(`${CONFIG.api}?action=code_claim`, {
    method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ name, code, bonuscode }),
  });

// 🌿 Envoyer le butin du mini-jeu (le serveur recalcule et plafonne le gain).
async function apiRecolteHerbes(name, herbes) {
  if (SIMULATION) {
    const GAIN = { normale: 1, bronze: 3, argent: 6, or: 12 };
    let gain = 0;
    for (const k in GAIN) gain += Math.min(300, herbes[k] || 0) * GAIN[k];
    gain = Math.min(gain, 80);
    const p = board.find((x) => x.name.toLowerCase() === name.toLowerCase());

    p.bonus = (p.bonus || 0) + gain;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
// 🎯 COMPOSITION DU QUIZ : 20 questions tirées AU HASARD dans un plus grand
// réservoir — 10 sur l'entreprise, 5 de culture générale (jardinage), 5 anecdotes.
// Deux personnes n'ont donc pas le même questionnaire : ça limite la triche.
const QUIZ_THEMES = { entreprise: 10, culture: 5, anecdote: 5 };
const QUIZ_TOTAL = Object.values(QUIZ_THEMES).reduce((a, b) => a + b, 0);
function prepareQuestions() {
  const parTheme = { entreprise: [], culture: [], anecdote: [] };
  QUESTIONS.forEach((q) => { (parTheme[q.theme] || parTheme.entreprise).push(q); });
  let choix = [], restes = [];
  for (const t in QUIZ_THEMES) {
    const dispo = shuffle(parTheme[t]);
    choix = choix.concat(dispo.slice(0, QUIZ_THEMES[t]));
    restes = restes.concat(dispo.slice(QUIZ_THEMES[t]));
  }
  // S'il n'y a pas assez de questions dans un thème, on complète avec les autres
  // (mieux vaut un quiz complet qu'un quiz tronqué).
  if (choix.length < QUIZ_TOTAL) choix = choix.concat(shuffle(restes).slice(0, QUIZ_TOTAL - choix.length));
  return shuffle(choix).map((item) => ({
    q: item.q,
    options: shuffle(item.options.map((text, i) => ({ text, good: i === item.correct }))),
  }));
}
function phaseNow() {
  if (SIMULATION && !APERCU) return "ouvert";   // simu « joueur » : quiz jouable à tout moment
  // (en aperçu daté, la phase suit l'horloge simulée — voir plus haut)
  const now = Date.now();
  if (now < CONFIG.dateLancement.getTime()) return "avant";
  if (now <= CONFIG.dateCloture.getTime()) return "ouvert";
  return "termine";
}

// 🌱 La graine du compte à rebours POUSSE en approchant du lancement : jour après
// jour elle grandit, l'arbre fleurit dans les 10 dernières secondes, et à
// l'arrivée il donne un fruit. (diff = millisecondes avant le lancement.)
function cdPousse(diff) {
  if (diff <= 0) return "🌳🍎";        // 🎉 l'arbre donne son fruit : c'est parti !
  if (diff <= 10000) return "🌳🌸";    // 10 dernières secondes : l'arbre fleurit
  const j = diff / 86400000;           // jours restants
  if (j < 0.5) return "🌳";            // dernières heures : l'arbre
  if (j < 1.5) return "🌿";            // ~1 jour : buisson
  if (j < 3)   return "🪴";            // ~2 jours : jeune plant
  if (j < 5)   return "🌱";            // ~3-4 jours : pousse
  return "🌰";                         // plus loin : la graine
}

function avatarDe(name) {
  let h = 0;
  for (const ch of String(name)) h = (h * 31 + ch.codePointAt(0)) % 100000;
  const couleur = AVATAR_COULEURS[h % AVATAR_COULEURS.length];
  const mots = String(name).trim().split(/\s+/);
  const ini = (mots[0]?.[0] || "?") + (mots[1]?.[0] || "");
  return `<span class="avatar" style="background:${couleur}">${esc(ini.toUpperCase())}</span>`;
}

      <div class="explik-step"><span class="explik-ico">🎁</span><span class="explik-txt"><b class="eh">Traque les codes bonus</b>Des codes sont cachés en magasin : chacun te rapporte <b>+${CONFIG.pointsParCodeBonus} graines</b>. Tu peux en accumuler <b>${CONFIG.maxCodes} au maximum</b> (soit +${CONFIG.pointsParCodeBonus * CONFIG.maxCodes} graines), et elles comptent au classement. <b>Même après avoir fait le quiz</b>, tu peux encore en récupérer : ça te fait remonter ! Ouvre l'œil 👀</span></div>
      <div class="explik-step"><span class="explik-ico">🌼</span><span class="explik-txt"><b class="eh">Ton jardin — après le quiz</b>Une fois ton quiz terminé, <b>ton jardin s'ouvre</b> : chacun a le sien, et c'est un espace juste pour s'amuser. Tu y dépenses tes graines pour planter des fleurs, des arbres, des variétés rares… Tu les verras diminuer, <b>c'est normal, ça ne concerne que le jardin</b> : <b>ton score au classement ne bouge pas</b>, va le vérifier dans « Classement ».</span></div>
      <div class="explik-step"><span class="explik-ico">🌿</span><span class="explik-txt"><b class="eh">Un mini-jeu bonus</b>La chasse aux mauvaises herbes te donne des graines <b>en plus, uniquement pour planter</b> dans ton jardin. Ça ne compte pas au classement.</span></div>
    </div>
    <button class="btn" id="explik-ok" style="width:100%;">J'ai tout compris, à moi de jouer ! 🌱</button>
  </div>`;
  document.body.appendChild(o);
  const ferme = () => o.remove();
  o.addEventListener("click", (e) => { if (e.target === o) ferme(); });
  o.querySelector("#explik-x").addEventListener("click", ferme);
  o.querySelector("#explik-ok").addEventListener("click", ferme);
}

// Un code bonus scanné AVANT d'avoir une carte est mis de côté ; dès qu'on est
// identifié (inscription ou récupération), on le récupère automatiquement.
async function reclamerEnAttente() {
  const c = litCodeAttente();
  if (!c || !joueur) return "";
  const res = await apiCodeClaim(joueur.name, joueur.code, c).catch(() => ({ ok: false }));
  videCodeAttente();
  if (res.ok) {
    joueur.solde = res.solde; joueur.recoltees = res.recoltees; joueur.nbCodes = res.nbCodes;
    return `🎁 Ton code bonus t'a été crédité : +${res.gagne} graines !`;
  }
  return "";
}

async function refreshBoard() {
  // Les écrans télé/borne gèrent leur propre affichage (la télé recharge le
  // classement toute seule à chaque boucle) : on ne touche pas au rendu ici.
  if (ECRAN !== "user") return;
  board = await apiGetBoard();
  const v = currentView();
  // On ne rafraîchit JAMAIS pendant le mini-jeu : ça remettrait la partie à zéro.
  if (v === "herbes") return;
  if (v === "jardin") { jardin = await apiJardin(); }
  // si on affiche le compte à rebours, le classement ou le jardin, on met à jour
  if (v === "board" || v === "jardin") render();
}
setInterval(refreshBoard, 30000); // auto-refresh

// Cette page ne montre QUE ce que voit un joueur : le compte à rebours avant
// l'ouverture, le quiz pendant, puis le classement et le jardin après avoir
// joué. La gestion se fait sur une page séparée (/quiz/admin).
function currentView() {
  // Récupérer un code ou son compte prime sur tout : si on arrive via un QR de
  // code bonus, on montre l'écran du code, pas le compte à rebours.
  if (userView === "reclamer") return "reclamer";
  if (userView === "retrouver") return "retrouver";
  if (userView === "creation") return "creation";
  // L'espace du compte : gate connexion/création si pas connecté, sinon dashboard.
  if (userView === "espace")    return joueur ? "dashboard" : "espace";
  if (userView === "dashboard") return joueur ? "dashboard" : "espace";
  // Vues qui exigent un compte : sinon on renvoie vers l'espace.
  if (userView === "quiz")   return phaseNow() === "ouvert" ? "quiz" : (joueur ? "dashboard" : "home");
  if (userView === "jardin") return joueur ? "jardin" : "espace";
  if (userView === "herbes") return joueur ? "herbes" : "espace";
  if (userView === "board")  return "board";   // classement : public
  // Défaut selon la phase : quiz fini → classement, sinon accueil.
  return phaseNow() === "termine" ? "board" : "home";
}

function renderCountdown() {
  const phase = phaseNow();
  const target = phase === "avant" ? CONFIG.dateLancement : CONFIG.dateCloture;
  const phaseLabel = phase === "avant" ? "🚀 Lancement dans..."
    : phase === "ouvert" ? "⏳ Fin du quiz dans..."
    : `🏆 Résultats le ${CONFIG.dateResultats} !`;
  const info = phase === "avant"
    ? "Quelque chose se prépare... rendez-vous le 29 juillet à 12h30 !"
    : phase === "ouvert"
      ? "Le quiz est ouvert ! Joue depuis ton téléphone et grimpe au classement."
      : "Le quiz est terminé. Merci à tous les participants ! 🎉";

  const top5 = board.slice(0, 5);
  const top5Html = (phase !== "avant" && top5.length)
    ? `<div class="cd-top5"><h3>🌟 Top 5 de la récolte</h3>${top5.map((p, i) =>
        `<div class="cd-top5-row"><span>${medals[i] || (i + 1) + "."} ${esc(p.name)}</span><span>${affG(p.score)} 🌰</span></div>`
      ).join("")}</div>`
    : "";

  app.innerHTML = `
    <div class="cd-wrap">
      <div class="cd-phase">${phaseLabel}</div>
      ${phase !== "termine" ? `
      <div class="cd-digits" id="cd-digits">
        <div class="cd-cell"><div class="cd-num" id="cd-j">--</div><div class="cd-lab">Jours</div></div>
        <div class="cd-cell"><div class="cd-num" id="cd-h">--</div><div class="cd-lab">Heures</div></div>
        <div class="cd-cell"><div class="cd-num" id="cd-m">--</div><div class="cd-lab">Minutes</div></div>
        <div class="cd-cell sec"><div class="cd-num" id="cd-s">--</div><div class="cd-lab">Secondes</div></div>
      </div>` : ""}
      <div class="cd-sprout" id="cd-sprout">${cdPousse(CONFIG.dateLancement.getTime() - Date.now())}</div>
      <div class="cd-info">${info}</div>
      ${top5Html}
    </div>`;

  clearInterval(tickTimer);
  if (phase !== "termine") {
    const tick = () => {
      const diff = Math.max(0, target.getTime() - Date.now());
      // La graine pousse en fonction du temps restant AVANT LE LANCEMENT :
      // jour après jour, puis fleur à 10 s, puis fruit une fois lancé.
      const sp = document.getElementById("cd-sprout");
      if (sp) sp.textContent = cdPousse(CONFIG.dateLancement.getTime() - Date.now());
      // 📺 Télé, avant le lancement : dès qu'il reste ≤ 10 s, on passe aux gros
      // chiffres seuls (teleFinal enchaîne ensuite confettis puis classement).
      if (ECRAN === "tele" && phase === "avant" && diff <= 10000) {
        clearInterval(tickTimer); teleFinal(); return;
      }
      if (diff === 0) { render(); return; } // bascule de phase (hors télé)
      $("#cd-j").textContent = pad(Math.floor(diff / 86400000));
      $("#cd-h").textContent = pad(Math.floor((diff % 86400000) / 3600000));
      $("#cd-m").textContent = pad(Math.floor((diff % 3600000) / 60000));
      $("#cd-s").textContent = pad(Math.floor((diff % 60000) / 1000));
    };
    tick();
    tickTimer = setInterval(tick, 1000);
  }
}

// 📺 TÉLÉ — les 10 dernières secondes : uniquement un chiffre géant (10 → 1).
function teleFinal() {
  document.body.classList.add("mode-tele");
  FEE.stop(); stopHerbes();
  app.innerHTML = `<div class="tf-wrap"><div class="tf-num" id="tf-num">10</div></div>`;
  clearInterval(tickTimer); clearTimeout(tickTimer);
  const maj = () => {
    const diff = CONFIG.dateLancement.getTime() - Date.now();
    if (diff <= 0) { clearInterval(tickTimer); teleLancement(); return; }
    const n = Math.max(1, Math.ceil(diff / 1000));
    const el = document.getElementById("tf-num");
    if (el && el.textContent != n) {
      el.textContent = n;
      el.classList.remove("pop"); void el.offsetWidth; el.classList.add("pop");
    }
  };
  maj();
  tickTimer = setInterval(maj, 100);   // 100 ms : bascule nette pile à zéro
}

// 📺 TÉLÉ — l'instant du lancement : confettis + mot de fête, 15 s, puis classement.
function teleLancement() {
  document.body.classList.add("mode-tele");
  FEE.stop();
  clearInterval(tickTimer); clearTimeout(tickTimer);
  app.innerHTML = `<div class="tf-wrap tl-wrap">
    <div class="tl-emoji">🎉</div>
    <div class="tl-titre">C'est parti !</div>
    <div class="tl-sous">Le grand quiz Famiformation est lancé 🌱</div>
  </div>`;
  lanceConfettis(9000);
  tickTimer = setTimeout(() => renderTeleBoard(), 15000);   // 15 s de fête
}

// 🎉 Pluie de confettis (décorative). La couche vit au-dessus de #app et survit
// à un re-rendu, puis se retire toute seule.
function lanceConfettis(ms = 6000) {
  const couleurs = ["#2E7D32", "#F7C13A", "#E4572E", "#4EA5D9", "#F2A2C4", "#8BC34A", "#FFFFFF"];
  const layer = document.createElement("div");
  layer.className = "confetti-layer";
  document.body.appendChild(layer);
  const N = 130;
  for (let i = 0; i < N; i++) {
    const c = document.createElement("i");
    c.className = "confetti";
    c.style.left = (Math.random() * 100) + "vw";
    c.style.background = couleurs[i % couleurs.length];
    c.style.animationDuration = (2.3 + Math.random() * 1.9) + "s";
    c.style.animationDelay = (Math.random() * 0.7) + "s";
    c.style.setProperty("--rot", (Math.random() * 900 - 300) + "deg");
    c.style.setProperty("--drift", (Math.random() * 34 - 17) + "vw");
    if (Math.random() < 0.5) c.style.borderRadius = "50%";
    layer.appendChild(c);
  }
  setTimeout(() => layer.remove(), ms + 2500);
}

function renderQuiz() {
  clearInterval(tickTimer);
  // Hors période d'ouverture, on repasse à l'accueil / tableau de bord.
  if (phaseNow() !== "ouvert") { render(); return; }
  // Nouveau flux : on joue APRÈS s'être identifié (création/connexion). Donc pas
  // de compte → on renvoie à l'espace. « Quiz déjà fait » ne bloque QU'AU
  // DÉMARRAGE (quiz null) : une partie en cours ou son écran final doivent pouvoir
  // s'afficher même si quizFait vient de passer à true.
  if (!joueur) { userView = "espace"; render(); return; }
  // En mode test (simulation), on peut REJOUER le quiz autant de fois qu'on veut.
  if (!quiz && joueur.quizFait && !toutOuvert()) { userView = "dashboard"; render(); return; }

  // On démarre directement le quiz avec la carte déjà en poche (plus d'intro).
  if (!quiz) quiz = { step: "play", pseudo: joueur.name, code: joueur.code, nom: "", error: "", questions: prepareQuestions(), idx: 0, correct: 0, start: Date.now(), score: 0, streak: 0, qStart: Date.now() };

  // ---- (fallback) Ancienne inscription intégrée au quiz — inutilisée dans le
  // nouveau flux, conservée par sécurité si quiz.step vaut « intro ». ----
  if (quiz.step === "intro") {
    app.innerHTML = `<div class="card">
      <div class="center"><div style="font-size:2.8rem;">🌱</div>
        <h2 class="q-text" style="margin:8px 0 14px;">Bienvenue, futur jardinier !</h2></div>
      ${quiz.error ? `<div class="alert">${esc(quiz.error)}</div>` : ""}
      <label class="lbl">Ton pseudo de jardinier</label>
      <input class="field" id="q-pseudo" placeholder="Ex : SuperMarie" maxlength="24" value="${esc(quiz.pseudo)}">
      <label class="lbl">Ton code secret de jardinier 🌱 (4 chiffres)</label>
      <input class="field" id="q-code" inputmode="numeric" maxlength="4" placeholder="Ex : ton année de naissance" value="${esc(quiz.code)}">
      <p class="mini-warn">⚠️ N'oublie pas ton pseudo et ton code : c'est ce qui te permet de retrouver ton jardin sur un autre téléphone.</p>
      <details class="plus"><summary>🌿 Compléter ma fiche (optionnel)</summary>
        <p class="hint" style="margin-top:8px;">Donne ton nom et prénom : ça permettra aux organisateurs de retrouver ton compte si tu oublies ton code — et de te remettre ton prix si tu gagnes. Pas obligatoire !</p>
        <input class="field" id="q-nom" placeholder="Nom Prénom (facultatif)" maxlength="60" value="${esc(quiz.nom)}">
      </details>
      <button class="btn" id="q-start" style="width:100%;">C'est parti ! 🚀</button>
      <p class="center" style="margin-top:12px;"><a href="#" id="q-retrouver" class="lien">J'ai déjà un compte</a></p>
      <details class="plus" style="margin-top:10px;"><summary>▸ En savoir plus</summary>
        <p class="hint" style="margin-top:8px;">Cette étape crée ton compte pour le grand quiz Famiflora : réponds aux questions, récolte des graines 🌱, trouve des codes bonus en magasin et fais fleurir ton jardin ! Ton pseudo apparaît au classement.</p>
      </details>
      <p class="center" style="margin-top:8px;"><a href="#" id="q-conf" class="lien conf">Politique de confidentialité</a></p>
    </div>`;
    $("#q-code").addEventListener("keydown", (e) => e.key === "Enter" && $("#q-start").click());
    $("#q-retrouver").addEventListener("click", (e) => { e.preventDefault(); quiz = null; userView = "retrouver"; render(); });
    $("#q-conf").addEventListener("click", (e) => { e.preventDefault(); ouvrePolitique(); });
    $("#q-start").addEventListener("click", async () => {
      const pseudo = $("#q-pseudo").value.trim();
      const code = $("#q-code").value.replace(/\D/g, "").slice(0, 4);
      quiz.pseudo = pseudo; quiz.code = code; quiz.nom = $("#q-nom").value.trim();
      if (pseudo.length < 2) { quiz.error = "Choisis un nom de jardinier (au moins 2 lettres) 🙂"; renderQuiz(); return; }
      if (code.length !== 4) { quiz.error = "Ton code jardinier doit faire 4 chiffres 🔢"; renderQuiz(); return; }
      $("#q-start").disabled = true;
      const exists = await apiCheckName(pseudo).catch(() => false);
      if (exists) {
        quiz.error = "Ce nom de jardinier est déjà pris ! Choisis-en un autre — ou clique « retrouver mon jardin » si c'est bien toi.";
        renderQuiz(); return;
      }
      quiz.error = ""; quiz.start = Date.now(); quiz.step = "play";
      renderQuiz();
    });
    return;
  }

  // ---- Petit écran transitoire pendant l'enregistrement ----
  if (quiz.step === "fin") {
    app.innerHTML = `<div class="card center"><div style="font-size:2.6rem;">🌱</div>
      <h2 class="q-text">On récolte tes graines…</h2></div>`;
    return;
  }

  if (quiz.step === "play") {
    const q = quiz.questions[quiz.idx];
    const graines = arr1(quiz.score);
    const stade = stadeDe(quiz.score);
    quiz.qStart = Date.now();   // ⏱ départ du chrono de CETTE question (bonus rapidité)
    app.innerHTML = `<div class="card">
      <div class="q-plante">
        <span class="stade">
          <span class="emo ${quiz.vientDePousser ? "pousse-pop" : ""}">${stade.emoji}</span>
          <span class="nom">${stade.nom}</span>
        </span>
        <span class="graines">${affG(graines)} 🌰${quiz.lastGain ? `<span class="gain">+${affG(quiz.lastGain)}</span>` : ""}${quiz.streak >= 2 ? `<span class="serie">🔥 ${quiz.streak}</span>` : ""}</span>
      </div>
      <div class="q-progress"><div style="width:${(quiz.idx / quiz.questions.length) * 100}%"></div></div>
      <div class="q-num">Question ${quiz.idx + 1} / ${quiz.questions.length}
        <span class="q-chrono" id="q-chrono" title="Plus tu réponds vite, plus tu gagnes de graines">⏱ 0,0 s</span>
      </div>
      <div class="q-text">${esc(q.q)}</div>
      ${q.options.map((o, i) => `<button class="q-opt" data-i="${i}">${esc(o.text)}</button>`).join("")}
    </div>`;
    // ⏱ Chrono de la question : il tourne à l'écran pour encourager la rapidité.
    clearInterval(chronoQ);
    chronoQ = setInterval(() => {
      const el = document.getElementById("q-chrono");
      if (!el) { clearInterval(chronoQ); return; }
      el.textContent = "⏱ " + ((Date.now() - quiz.qStart) / 1000).toFixed(1).replace(".", ",") + " s";
    }, 100);

    app.querySelectorAll(".q-opt").forEach((btn) => btn.addEventListener("click", async () => {
      clearInterval(chronoQ);
      const avant = stadeDe(quiz.score);
      const tSec = (Date.now() - quiz.qStart) / 1000;   // temps de réponse (avec décimales)
      if (q.options[btn.dataset.i].good) {
        quiz.streak++;
        const gain = gainReponse(tSec, quiz.streak);     // base + rapidité (ratio) + série
        quiz.score += gain;
        quiz.correct++;
        quiz.lastGain = arr1(gain);
      } else {
        quiz.streak = 0;
        quiz.lastGain = 0;
      }
      const apres = stadeDe(quiz.score);
      quiz.vientDePousser = apres.min !== avant.min; // la plante vient de changer de stade
      if (quiz.idx + 1 < quiz.questions.length) { quiz.idx++; renderQuiz(); return; }
      // Dernière question : on inscrit la récolte sur le compte (déjà créé).
      quiz.step = "fin"; renderQuiz();
      const time = Math.round((Date.now() - quiz.start) / 1000);
      quiz.tempsTotal = time;          // pour l'afficher sur l'écran de fin
      quiz.score = arr1(quiz.score);   // score final à virgule (les décimales départagent)
      await apiSubmit({ name: quiz.pseudo, code: quiz.code, nom: quiz.nom, score: quiz.score, correct: quiz.correct, time }).catch(() => {});
      sauveMoi(quiz.pseudo, quiz.code);                    // l'appareil perso se souvient
      if (!joueur) joueur = { name: quiz.pseudo, code: quiz.code, nbCodes: 0 };
      joueur.recoltees = quiz.score;
      joueur.quizFait = true;                              // le jardin se débloque
      const s = await apiSolde(quiz.pseudo).catch(() => null);
      joueur.solde = (s && s.exists) ? s.solde : quiz.score;
      board = await apiGetBoard();
      quiz.messageCode = await reclamerEnAttente();        // un code scanné avant de jouer ?
      quiz.step = "done"; renderQuiz();
    }));
    return;
  }

  // done
  const stadeFinal = stadeDe(quiz.score);
  app.innerHTML = `<div class="card center">
    <div style="font-size:4.2rem; line-height:1.1;">${stadeFinal.emoji}</div>
    <h2 class="q-text" style="margin-bottom:6px;">Bravo ${esc(quiz.pseudo)}, te voilà « ${stadeFinal.nom} » !</h2>
    <div class="score-big">${affG(joueur.recoltees)} 🌰</div>
    <p class="hint" style="margin-top:14px;">
      <b>${quiz.correct} bonne${quiz.correct > 1 ? "s" : ""} réponse${quiz.correct > 1 ? "s" : ""} sur ${quiz.questions.length}</b>
      · ⏱ ${quiz.tempsTotal ?? 0} s au total (soit ${((quiz.tempsTotal ?? 0) / quiz.questions.length).toFixed(1).replace(".", ",")} s par question).
      ${quiz.messageCode ? `<br>${esc(quiz.messageCode)}` : ""}
      <br>Trouve des codes bonus en magasin (+${CONFIG.pointsParCodeBonus} 🌰 chacun, ${CONFIG.maxCodes} max) : eux comptent au classement !
      <br>Annonce des vainqueurs le ${CONFIG.dateResultats} — bonne chance ! 🍀</p>
    <div style="display:flex; gap:10px; flex-wrap:wrap; justify-content:center;">
      <button class="btn" id="q-jardin">🌼 Planter dans mon jardin</button>
      <button class="btn ghost" id="q-board">Voir le classement 🏆</button>
    </div>
    <p class="center" style="margin-top:12px;"><button class="lien-explik" id="q-explik">✨ Comment ça marche ? Découvre tout ce que tu peux faire</button></p>
  </div>`;
  $("#q-explik").addEventListener("click", ouvreExplication);
  $("#q-jardin").addEventListener("click", async () => {
    jardin = await apiJardin();
    userView = "jardin";
    quiz = null;
    render();
  });
  $("#q-board").addEventListener("click", () => {
    userView = "board";
    quiz = null;
    render();
  });
  // Petite fenêtre qui annonce la fin du quiz (une seule fois par partie).
  if (!quiz.modaleFinVue) { quiz.modaleFinVue = true; modaleQuizFini(joueur.recoltees || 0); }
}

// 🎉 Modale de fin de quiz : annonce la récolte et invite à planter (sans jamais
// impacter le classement, on le répète pour lever le doute sur la thésaurisation).
function modaleQuizFini(graines) {
  const o = document.createElement("div");
  o.className = "modal-fond";
  o.innerHTML = `<div class="modal code-modal">
    <div class="cm-emoji">🎉</div>
    <h2 class="cm-titre">Quiz terminé !</h2>
    <p class="cm-sous">Tu as récolté <b>${affG(graines)} 🌰</b> graines.<br>
      <b>Ton jardin est maintenant ouvert</b> 🌼 : va y planter tes graines, c'est un espace juste pour s'amuser.
      Tu verras tes graines à planter diminuer — <b>c'est normal, ça ne concerne que le jardin</b> :
      <b>ton score au classement ne bougera pas</b>.</p>
    <div class="cm-modules">
      <button class="cm-mod" data-qf="jardin"><span class="cm-mod-emo">🌼</span><span class="cm-mod-titre">Mon jardin</span></button>
      <button class="cm-mod" data-qf="board"><span class="cm-mod-emo">🏆</span><span class="cm-mod-titre">Le classement</span></button>
    </div>
  </div>`;
  document.body.appendChild(o);
  lanceConfettis(6000);   // 🎉 on célèbre la fin du quiz
  const ferme = () => o.remove();
  o.querySelector('[data-qf="jardin"]').addEventListener("click", async () => { ferme(); jardin = await apiJardin(); userView = "jardin"; quiz = null; render(); });
  o.querySelector('[data-qf="board"]').addEventListener("click", () => { ferme(); userView = "board"; quiz = null; render(); });
  o.addEventListener("click", (e) => { if (e.target === o) ferme(); });
}
